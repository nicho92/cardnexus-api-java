                  status:
                    enum:
                      - forSale
                      - toComplete
                      - hold
                    type: string
                    description: What the list is for.
                    examples:
                      - toComplete
                    x-enum-descriptions:
                      forSale: Cards you're offering for sale.
                      toComplete: Cards you're working to complete, such as a want list or a deck in
                        progress.
                      hold: Cards you're keeping aside.
                  description:
                    anyOf:
                      - type: string
                      - type: "null"
                    description: Your free-text note on the list. `null` when there is none.
                  completionPercentage:
                    type: number
                    description: How complete the list is, from 0 to 100, based on how many wanted
                      copies you already hold.
                  itemCount:
                    type: integer
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                    description: How many distinct lines the list holds.
                  totalQuantity:
                    type: integer
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                    description: The sum of every line's quantity.
