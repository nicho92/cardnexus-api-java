  /feeds/{gameId}/prices:
    get:
      operationId: feeds.getPrices
      summary: Get the prices feed
      description: >-
        Returns a download link and metadata for a game's prices feed.


        The file is gzip-compressed, newline-delimited JSON. Each line is one
        product: its current market value and 24-hour, 7-day, and 30-day change,
        in EUR and USD, broken down by finish. Products link back to the catalog
        feed by `productId`.


        The prices feed is rebuilt when a game's prices are refreshed. The `url`
        is a time-limited download link; request this endpoint again for a fresh
        link once it expires.


        The file's record shape (one product per line, with per-finish EUR/USD
        prices) is documented at https://docs.cardnexus.com/feeds/prices.


        Authentication is required (any valid API key); no scope.
      tags:
        - Feeds
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            description: The game's identifier (e.g. `mtg`, `pokemon`). Returned by `GET
              /v1/games`.
      responses:
        "200":
          description: Prices feed metadata returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  feedType:
                    const: prices
                    description: Which feed this is.
                  url:
                    type: string
                    description: A time-limited link to download the feed file. It stops working at
                      `urlExpiresAt`; request this endpoint again for a fresh
                      link.
                  urlExpiresAt:
                    type: string
                    format: date-time
                    description: When `url` stops working.
                    examples:
                      - 2024-08-14T10:23:11.000Z
                  checksum:
                    type: string
                    description: SHA-256 hash of the feed's uncompressed contents. It changes only
                      when the feed's contents change.
                  sizeBytes:
                    type: integer
                    minimum: 0
                    maximum: 9007199254740991
                    description: Size of the gzip-compressed file, in bytes.
                  recordCount:
                    type: integer
                    minimum: 0
                    maximum: 9007199254740991
                    description: Number of records in the file (one record per line).
                  format:
                    const: ndjson
                    description: "The file format: newline-delimited JSON, one record per line."
                  encoding:
                    const: gzip
                    description: The file is gzip-compressed. Decompress it before reading.
                  lastRefreshedAt:
                    type: string
                    format: date-time
                    description: When this feed was last rebuilt. This advances on every rebuild,
                      even when the new file is identical to the previous one.
                    examples:
                      - 2024-08-14T10:23:11.000Z
                  generatedAt:
                    type: string
                    format: date-time
                    description: "When the feed's current contents were first produced. This
                      advances only when the contents actually change, so it
                      tracks `checksum`: a rebuild that produces the same
                      `checksum` keeps the same `generatedAt`, while
                      `lastRefreshedAt` still moves."
                    examples:
                      - 2024-08-14T10:23:11.000Z
                required:
                  - feedType
                  - url
                  - urlExpiresAt
                  - checksum
                  - sizeBytes
                  - recordCount
                  - format
                  - encoding
                  - lastRefreshedAt
                  - generatedAt
                examples:
