  /lists/{listId}/items:
    post:
      operationId: lists.addItems
      summary: Add or update cards in a list
      description: >-
        Adds cards to a list, or updates cards already in it, in a single call.
        Returns the list with its new contents.


        Each entry names a catalogue product plus its finish and language. Set
        `quantity` to `0` to remove that card. To change an existing line, pass
        its `itemId` from a list response.


        Every card must belong to the list's game. A single list can hold at
        most 2000 cards.


        Send an `Idempotency-Key` header to make retries safe.


        Requires the `lists:write` scope.
      tags:
        - List items
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            description: The list's id. Path parameter.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  minItems: 1
                  maxItems: 1000
                  items:
                    type: object
                    properties:
                      itemId:
                        type: string
                        minLength: 1
                        description: The id of an existing line to update, from a list response. Omit to
                          add a new line.
                      productId:
                        anyOf:
                          - type: number
                          - type: string
                            pattern: ^[0-9]+$
                        description: The catalogue product to add, from `POST /v1/products/search`.
                        examples:
                          - 50212
                      finish:
                        enum:
                          - Standard
                          - Foil
                          - Rainbow
                          - Gold
                          - Rainbow Foil
                          - Cold Foil
                          - Gold Foil
                          - Etched
                          - Signed
                          - Reverse Holo
                          - Blast Foil Rainbow
                          - Bubbles Foil
                          - Cracked Ice Foil
                          - Galaxy Foil
                          - Glitter Foil
                          - Multi Sideline Foil
                          - Rainbow Solid Texture Stamp
                          - Star Foil
                          - Surge Foil
                          - Full Art Gold Sign
                          - Depth Lenticular
                          - Flip Lenticular
                          - Lenticular
                          - Zarimoth
                          - Serialized
                          - Serialized Rose Gold
                          - Serialized Gold
                          - Holographic
                          - Embossed
                          - Holofoil
                        type: string
                        description: The card's finish, e.g. `Standard`, `Foil`, `Reverse Holo`.
                        x-enum-descriptions:
                          Standard: A standard, non-foil card.
                          Foil: A foil card.
                          Reverse Holo: A card with a reverse-holofoil finish.
                          Etched: A card with an etched-foil finish.
                      language:
                        enum:
                          - en
                          - fr
                          - de
                          - it
                          - es
                          - nl
                          - pl
                          - grc
                          - ar
                          - zh-Hans
                          - zh-Hant
                          - zh-cn
                          - he
                          - ja
                          - ko
                          - th
                          - id
                          - la
                          - art-x-phyrexian
                          - pt-BR
                          - pt-PT
                          - ru
                          - sa
                        type: string
                        description: The card's language as a short code, e.g. `en`, `fr`.
                        examples:
                          - en
                      quantity:
                        type: integer
                        minimum: 0
                        maximum: 9007199254740991
                        description: How many copies this line calls for. Send `0` to remove the line.
                      minCondition:
                        $ref: "#/components/schemas/CardCondition"
                        description: The minimum condition you'll accept for this card. Omit to leave it
                          unset.
                      wantPrice:
                        anyOf:
                          - type: number
                            minimum: 0
                          - type: "null"
                        description: Your target price per copy, in the list's currency. Send `null` to
                          clear it.
                      sellPrice:
                        anyOf:
                          - type: number
                            minimum: 0
                          - type: "null"
                        description: Your sale price per copy, in the list's currency. Send `null` to
                          clear it.
                    required:
                      - productId
                      - finish
                      - language
                      - quantity
                  description: The cards to add or update, up to 1000 per request. A card already
                    in the list — same product, finish, and language — has its
                    quantity replaced, not added to.
              required:
                - items
      responses:
        "200":
          description: List updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Stable opaque identifier for this list. Do not parse.
                  name:
                    type: string
                    description: The list's name.
                  game:
                    type: string
