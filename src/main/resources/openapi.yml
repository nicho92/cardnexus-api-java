  /inventory/bulk/update:
    post:
      operationId: inventory.bulkUpdate
      summary: Update inventory lines in bulk
      description: >-
        Changes up to 200 inventory lines in one call, without a file
        round-trip. Each item names one line — by `inventoryId` or by `customId`
        — and carries the changes to apply: quantity, condition, language,
        finish, comment, notes, location, or tags. Send only the fields you want
        to change. Each line can appear in only one item per call; further items
        naming the same line are rejected with `INVALID_ITEM`. The same change
        rules as `PATCH /v1/inventory/{inventoryId}` apply, including `count`
        splits, merging into an identical line, the `location` name (or `null`
        to clear), and the `tags` `{"set"|"add"|"remove"}` change. `location`
        and `tags` names must already exist, or the item is rejected with
        `LOCATION_NOT_FOUND` or `TAG_NOT_FOUND`.


        Items are checked one by one. Items that fail — unknown line, quantity
        underflow, invalid `count` — come back in `results` with `status:
        "error"` and do not block the rest. All items that pass are applied
        together: either every one of them takes effect, or — when they collide
        with each other or with another of your lines — none do and the call
        fails with `CONFLICT`.


        Send an `Idempotency-Key` header to make retries safe: the same key
        returns the same response for 24 hours.


        Requires the `inventory:write` scope.
      tags:
        - Bulk operations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  minItems: 1
                  maxItems: 200
                  items:
                    type: object
                    properties:
                      inventoryId:
                        type: string
                        minLength: 1
                        description: The inventory line to change, by its identifier. Each item names
                          its line with either `inventoryId` or `customId` —
                          exactly one of the two.
                      customId:
                        $ref: "#/components/schemas/CustomId"
                        description: The inventory line to change, by your own identifier. Each item
                          names its line with either `inventoryId` or `customId`
                          — exactly one of the two.
                      quantity:
                        anyOf:
                          - type: object
                            properties:
                              set:
                                type: integer
                                minimum: 1
                                maximum: 9007199254740991
                                description: The line's new total quantity.
                            required:
                              - set
                            additionalProperties: false
                          - type: object
                            properties:
                              adjust:
                                type: integer
                                minimum: -9007199254740991
                                maximum: 9007199254740991
                                description: Cards to add (positive) or remove (negative).
                            required:
                              - adjust
                            additionalProperties: false
                        description: 'Quantity change: `{"set": n}` replaces the quantity, `{"adjust":
                          n}` adds or removes cards — one or the other, never
                          both. A change that would leave zero or fewer cards is
                          rejected — use `DELETE /v1/inventory/{inventoryId}` to
                          remove a line.'
                      condition:
                        $ref: "#/components/schemas/CardCondition"
                        description: "New condition: `NM`, `LP`, `MP`, `HP`, or `DMG`."
                      language:
                        type: string
                        minLength: 1
                        description: New language, as a two-letter code, e.g. `en`.
                      finish:
                        enum:
                          - Standard
                          - Foil
                          - Rainbow
                          - Gold
                          - Rainbow Foil
                          - Cold Foil
                          - Gold Foil
                          - Etched
                          - Signed
                          - Reverse Holo
                          - Blast Foil Rainbow
                          - Bubbles Foil
                          - Cracked Ice Foil
                          - Galaxy Foil
                          - Glitter Foil
                          - Multi Sideline Foil
                          - Rainbow Solid Texture Stamp
                          - Star Foil
                          - Surge Foil
                          - Full Art Gold Sign
                          - Depth Lenticular
                          - Flip Lenticular
                          - Lenticular
                          - Zarimoth
                          - Serialized
                          - Serialized Rose Gold
                          - Serialized Gold
                          - Holographic
                          - Embossed
                          - Holofoil
                        type: string
                        description: New finish, e.g. `Standard`, `Foil`, `Reverse Holo`.
                        x-enum-descriptions:
                          Standard: A standard, non-foil card.
                          Foil: A foil card.
                          Reverse Holo: A card with a reverse-holofoil finish.
                          Etched: A card with an etched-foil finish.
                      comment:
                        anyOf:
                          - $ref: "#/components/schemas/InventoryComment"
                          - type: "null"
                        description: New free-text note for the line, shown to buyers on your
                          Marketplace listing. Pass `null` to remove it.
                      notes:
                        anyOf:
                          - type: string
                            maxLength: 2000
                            description: Private free-text note attached to this inventory line, visible
                              only to you. Never shown to buyers.
                            examples:
                              - Bought at the March show, restock from supplier A
                          - type: "null"
                        description: New private note for the line, visible only to you. Pass `null` to
                          remove it.
                      location:
                        anyOf:
                          - type: string
                            minLength: 1
                            maxLength: 100
                            description: The label's name. Matched case-insensitively, with surrounding
                              spaces ignored — `Shelf A` and `shelf a` are the
                              same label.
                            examples:
                              - Trade binder
                          - type: "null"
                        description: The location for this line, by name. Must match one of your
                          existing locations. Pass `null` to move the line to no
                          location.
                      tags:
                        anyOf:
                          - type: object
                            properties:
                              set:
                                type: array
                                maxItems: 50
                                items:
                                  type: string
                                  minLength: 1
                                  maxLength: 100
                                  description: The label's name. Matched case-insensitively, with surrounding
                                    spaces ignored — `Shelf A` and `shelf a` are
                                    the same label.
                                  examples:
                                    - Trade binder
                                description: Replace the line's tags with exactly these. Send `[]` to remove all
                                  tags.
                            required:
                              - set
                            additionalProperties: false
                          - type: object
                            properties:
                              add:
                                type: array
                                minItems: 1
                                maxItems: 50
                                items:
                                  type: string
                                  minLength: 1
                                  maxLength: 100
                                  description: The label's name. Matched case-insensitively, with surrounding
                                    spaces ignored — `Shelf A` and `shelf a` are
                                    the same label.
                                  examples:
                                    - Trade binder
                                description: Add these tags to the line, keeping the ones it already has.
                            required:
                              - add
                            additionalProperties: false
                          - type: object
                            properties:
                              remove:
                                type: array
                                minItems: 1
                                maxItems: 50
                                items:
                                  type: string
                                  minLength: 1
                                  maxLength: 100
                                  description: The label's name. Matched case-insensitively, with surrounding
                                    spaces ignored — `Shelf A` and `shelf a` are
                                    the same label.
                                  examples:
                                    - Trade binder
                                description: Remove these tags from the line, leaving the ones you don't list.
                            required:
                              - remove
                            additionalProperties: false
                        description: "How to change the line's tags: `{\"set\": [...]}` replaces the
                          whole set (`{\"set\": []}` clears them), `{\"add\":
                          [...]}` adds without removing others, `{\"remove\":
                          [...]}` removes only the ones you name. Choose exactly
                          one. Every name must match one of your existing tags."
                      count:
                        type: integer
                        minimum: 1
                        maximum: 9007199254740991
                        description: "Apply the attribute changes to only this many cards. When `count`
                          is lower than the line's quantity, the line splits:
                          `count` cards take the changes, the rest stays
                          unchanged. Needs at least one attribute change and
                          cannot be combined with `quantity`."
                  description: The changes to apply — between 1 and 200 items per call.
              required:
                - items
      responses:
        "200":
          description: Items processed. Check each entry in `results` for its outcome.
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
