  /products/{productId}/prices/history:
    get:
      operationId: pricing.getHistory
      summary: Get a product's price history
      description: >-
        Returns the product's daily price snapshots from Cardmarket (EUR) and
        TCGplayer (USD), one entry per day, marketplace, and finish, ordered by
        date ascending.


        Each entry carries the day's `low`/`mid`/`high`/`marketValue` tiers.
        Days without a snapshot are absent from the result.


        Narrow the result with `marketplace` and `finish`. `from` and `to` bound
        the range (both inclusive): `to` defaults to today, `from` to 30 days
        before `to`, and a single request can span at most 365 days.


        For the current price including live CardNexus listings, see `GET
        /v1/products/{productId}/prices`.


        Requests count against the `pricing-history` rate limit: 120 requests
        per hour.


        Authentication is required (any valid API key); no scope.
      tags:
        - Pricing
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            anyOf:
              - type: number
              - type: string
                pattern: ^[0-9]+$
            description: The product to get price history for. Returned by `GET
              /v1/products` and `POST /v1/products/search`.
            examples:
              - 50212
        - name: marketplace
          in: query
          required: false
          schema:
            enum:
              - cardmarket
              - tcgplayer
            type: string
            description: "Return only this marketplace's prices: `cardmarket` (EUR) or
              `tcgplayer` (USD). Omit for both."
            x-enum-descriptions:
              cardmarket: Cardmarket.
              tcgplayer: TCGplayer.
          allowEmptyValue: true
          allowReserved: true
        - name: finish
          in: query
          required: false
          schema:
            enum:
              - Standard
              - Foil
              - Rainbow
              - Gold
              - Rainbow Foil
              - Cold Foil
              - Gold Foil
              - Etched
              - Signed
              - Reverse Holo
              - Blast Foil Rainbow
              - Bubbles Foil
              - Cracked Ice Foil
              - Galaxy Foil
              - Glitter Foil
              - Multi Sideline Foil
              - Rainbow Solid Texture Stamp
              - Star Foil
              - Surge Foil
              - Full Art Gold Sign
              - Depth Lenticular
              - Flip Lenticular
              - Lenticular
              - Zarimoth
              - Serialized
              - Serialized Rose Gold
              - Serialized Gold
              - Holographic
              - Embossed
              - Holofoil
            type: string
            description: Return only this finish's prices, e.g. `Standard` or `Foil`. Omit
              for all finishes.
            x-enum-descriptions:
              Standard: A standard, non-foil card.
              Foil: A foil card.
              Reverse Holo: A card with a reverse-holofoil finish.
              Etched: A card with an etched-foil finish.
          allowEmptyValue: true
          allowReserved: true
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
            description: First day of the range, `YYYY-MM-DD`, inclusive. Defaults to 30
              days before `to`.
            examples:
              - 2026-05-11
          allowEmptyValue: true
          allowReserved: true
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
            description: Last day of the range, `YYYY-MM-DD`, inclusive. Defaults to today.
            examples:
              - 2026-06-10
          allowEmptyValue: true
          allowReserved: true
      responses:
        "200":
          description: Price history returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  productId:
                    type: integer
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                    description: The product these prices belong to.
                    examples:
                      - 50212
                  from:
                    type: string
                    format: date
                    description: First day of the returned range, `YYYY-MM-DD`, inclusive.
                  to:
                    type: string
                    format: date
                    description: Last day of the returned range, `YYYY-MM-DD`, inclusive.
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                          description: The calendar date this price is for, `YYYY-MM-DD`.
                          examples:
                            - 2026-06-08
                        marketplace:
                          enum:
                            - cardmarket
                            - tcgplayer
                          type: string
                          description: The marketplace this price comes from. `cardmarket` prices are in
                            EUR, `tcgplayer` prices in USD.
                          examples:
                            - cardmarket
                          x-enum-descriptions:
                            cardmarket: Cardmarket.
                            tcgplayer: TCGplayer.
                        finish:
                          enum:
                            - Standard
                            - Foil
                            - Rainbow
                            - Gold
                            - Rainbow Foil
                            - Cold Foil
                            - Gold Foil
                            - Etched
                            - Signed
                            - Reverse Holo
                            - Blast Foil Rainbow
                            - Bubbles Foil
                            - Cracked Ice Foil
                            - Galaxy Foil
                            - Glitter Foil
                            - Multi Sideline Foil
                            - Rainbow Solid Texture Stamp
                            - Star Foil
                            - Surge Foil
                            - Full Art Gold Sign
                            - Depth Lenticular
                            - Flip Lenticular
                            - Lenticular
                            - Zarimoth
                            - Serialized
                            - Serialized Rose Gold
                            - Serialized Gold
                            - Holographic
                            - Embossed
                            - Holofoil
                          type: string
                          description: The finish this price is for, e.g. `Standard` or `Foil`.
                          x-enum-descriptions:
                            Standard: A standard, non-foil card.
                            Foil: A foil card.
                            Reverse Holo: A card with a reverse-holofoil finish.
                            Etched: A card with an etched-foil finish.
                        low:
                          type: number
                          description: Lowest observed price that day, decimal major units.
                        mid:
                          type: number
                          description: Median observed price that day, decimal major units.
                        high:
