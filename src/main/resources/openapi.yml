  /inventory/{inventoryId}/listing:
    post:
      operationId: listings.create
      summary: List an inventory line for sale
      description: >-
        Publishes an inventory line to the Marketplace at the given per-card
        price. The price currency must match your seller currency, and your
        seller account must be active.


        By default the whole line is listed. Pass `quantity` to list only part
        of it: the listed cards move to their own line (returned as `line`), the
        rest stays in your Collection on the original line (returned as
        `remainder`). The split-off listed line inherits the original's
        `comment` but never its `customId`.


        If listing the whole line makes it identical to one of your existing
        listed lines (same product, finish, condition, language, grading, and
        price, neither line carrying a `customId`), the two merge; `line` is the
        surviving line.


        Send an `Idempotency-Key` header to make retries safe: the same key
        returns the same response for 24 hours.


        Requires the `listings:write` scope.
      tags:
        - Listings
      parameters:
        - name: inventoryId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            description: The inventory line to list. Returned by `GET /v1/inventory`. Path
              parameter.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                price:
                  type: object
                  properties:
                    amount:
                      type: number
                      description: Decimal amount in the currency's major unit (e.g. `5.23` for
                        €5.23). 2 decimal places for EUR/USD/GBP/CHF/CAD/AUD.
                    currency:
                      enum:
                        - USD
                        - EUR
                        - GBP
                        - CAD
                        - CHF
                        - SEK
                        - DKK
                        - NOK
                        - PLN
                        - HUF
                      type: string
                      x-enum-descriptions:
                        USD: US Dollar.
                        EUR: Euro.
                        GBP: British Pound.
                        CAD: Canadian Dollar.
                        CHF: Swiss Franc.
                        SEK: Swedish Krona.
                        DKK: Danish Krone.
                        NOK: Norwegian Krone.
                        PLN: Polish Złoty.
                        HUF: Hungarian Forint.
                  required:
                    - amount
                    - currency
                  description: The per-card price. The currency must match your seller currency.
                  examples:
                    - amount: 14.99
                      currency: USD
                quantity:
                  type: integer
                  minimum: 1
                  maximum: 9007199254740991
                  description: "How many cards to list. Defaults to the line's full quantity.
                    Listing fewer splits the line: the listed cards move to
                    their own line."
              required:
                - price
      responses:
        "200":
          description: Line listed for sale.
          content:
            application/json:
              schema:
                type: object
                properties:
                  line:
                    type: object
                    properties:
                      id:
                        type: string
                        description: Stable opaque identifier for this inventory line. Do not parse.
                      customId:
