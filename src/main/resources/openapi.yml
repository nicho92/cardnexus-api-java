                            - type: object
                              properties:
                                id:
                                  type: integer
                                  minimum: -9007199254740991
                                  maximum: 9007199254740991
                                  description: The matching CardNexus product's identifier. Stable number — pass
                                    it back to address the product elsewhere,
                                    e.g. as the `productId` in a bulk import
                                    row.
                                  examples:
                                    - 50212
                                name:
                                  type: string
                                  description: The product's display name.
                                gameId:
                                  type: string
                                  description: The game this product belongs to (e.g. `mtg`, `pokemon`).
                                expansionId:
                                  anyOf:
                                    - $ref: "#/components/schemas/CatalogId"
                                    - type: "null"
                                  description: The expansion this product belongs to, or `null` when it isn't tied
                                    to a single set.
                                finish:
                                  enum:
                                    - Standard
                                    - Foil
                                    - Rainbow
                                    - Gold
                                    - Rainbow Foil
                                    - Cold Foil
                                    - Gold Foil
                                    - Etched
                                    - Signed
                                    - Reverse Holo
                                    - Blast Foil Rainbow
                                    - Bubbles Foil
                                    - Cracked Ice Foil
                                    - Galaxy Foil
                                    - Glitter Foil
                                    - Multi Sideline Foil
                                    - Rainbow Solid Texture Stamp
                                    - Star Foil
                                    - Surge Foil
                                    - Full Art Gold Sign
                                    - Depth Lenticular
                                    - Flip Lenticular
                                    - Lenticular
                                    - Zarimoth
                                    - Serialized
                                    - Serialized Rose Gold
                                    - Serialized Gold
                                    - Holographic
                                    - Embossed
                                    - Holofoil
                                  type: string
                                  description: The finish this marketplace id maps to (e.g. `Standard`, `Foil`). A
                                    marketplace id is finish-specific, so the
                                    same card's Foil and Standard printings
                                    carry different ids.
                                  x-enum-descriptions:
                                    Standard: A standard, non-foil card.
                                    Foil: A foil card.
                                    Reverse Holo: A card with a reverse-holofoil finish.
                                    Etched: A card with an etched-foil finish.
                              required:
