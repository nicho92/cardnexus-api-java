    post:
      operationId: inventory.create
      summary: Add inventory lines
      description: >-
        Adds new lines to your inventory — between 1 and 1000 per call.


        Each line names a catalogue product (see `GET /v1/products`), a finish,
        a language, and a quantity, plus either a `condition` (raw cards) or
        `graded` details (graded cards). Optionally attach a `customId` (your
        own identifier, unique across your live lines), a `comment` (shown to
        buyers), private `notes`, a `location`, `tags`, or a `listing` to
        publish the line to the Marketplace right away.


        `location` and `tags` are referenced by name and must already exist —
        create them first with `POST /v1/inventory/locations` and `POST
        /v1/inventory/tags`. A name that matches none of your labels rejects
        that line with `LOCATION_NOT_FOUND` or `TAG_NOT_FOUND`.


        Lines are processed one by one: valid lines land in `created`, rejected
        lines are reported in `errors` with the position they had in your
        request. The response status is 200 even when some — or all — lines were
        rejected, so check both fields.


        A new line without a `customId` that matches an existing line of yours
        exactly (same product, finish, condition, language, grading, and listing
        state) merges into it: the quantity is added to the existing line, and
        that line is returned in `created`.


        When any line carries a `listing`, your seller account must be active
        and every listing price must use your seller currency.


        Send an `Idempotency-Key` header to make retries safe: the same key
        returns the same response for 24 hours.


        Requires the `inventory:write` scope.
      tags:
        - Lines
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lines:
                  type: array
                  minItems: 1
                  maxItems: 1000
                  items:
                    type: object
                    properties:
                      productId:
                        anyOf:
                          - type: number
                          - type: string
                            pattern: ^[0-9]+$
                        description: The catalogue product to stock. Product ids come from `GET
                          /v1/products`.
                        examples:
                          - 50212
                      finish:
                        enum:
                          - Standard
                          - Foil
                          - Rainbow
                          - Gold
                          - Rainbow Foil
                          - Cold Foil
                          - Gold Foil
                          - Etched
                          - Signed
                          - Reverse Holo
                          - Blast Foil Rainbow
                          - Bubbles Foil
                          - Cracked Ice Foil
                          - Galaxy Foil
                          - Glitter Foil
                          - Multi Sideline Foil
                          - Rainbow Solid Texture Stamp
                          - Star Foil
                          - Surge Foil
                          - Full Art Gold Sign
                          - Depth Lenticular
                          - Flip Lenticular
                          - Lenticular
                          - Zarimoth
                          - Serialized
                          - Serialized Rose Gold
                          - Serialized Gold
                          - Holographic
                          - Embossed
                          - Holofoil
                        type: string
                        description: The card's finish, e.g. `Standard`, `Foil`, `Reverse Holo`. Must be
                          a finish the product exists in.
                        x-enum-descriptions:
                          Standard: A standard, non-foil card.
                          Foil: A foil card.
                          Reverse Holo: A card with a reverse-holofoil finish.
                          Etched: A card with an etched-foil finish.
                      condition:
                        $ref: "#/components/schemas/CardCondition"
                        description: "The card's condition: `NM`, `LP`, `MP`, `HP`, or `DMG`. Required
                          for raw cards; omit for graded cards."
                      graded:
                        type: object
                        properties:
                          grade:
                            type: string
                            minLength: 1
                            description: The grade printed on the slab, e.g. `9.5`.
                          certification:
                            type: string
                            minLength: 1
                            description: The certification number printed on the slab. Omit it when you do
                              not have it.
                          gradingService:
                            enum:
                              - PSA
                              - Beckett
                              - CGC
                              - TAG
                              - PCG
                              - CCC
                              - PCA
                              - CollectAura
                              - MTGGrade
                              - PureGrading
                              - SGS
                            type: string
                            description: The grading company that graded the card, e.g. `PSA`, `Beckett`,
                              `CGC`.
                            x-enum-descriptions:
                              PSA: Professional Sports Authenticator.
                              Beckett: Beckett Grading Services.
                              CGC: Certified Guaranty Company.
                        required:
                          - grade
                          - gradingService
                        description: Grading details when the card is graded. Omit for raw cards.
                      language:
                        type: string
                        minLength: 1
                        description: The card's language as a two-letter code, e.g. `en`, `fr`, `de`.
                          Must be a language the product exists in.
                      quantity:
                        type: integer
                        minimum: 1
                        maximum: 9007199254740991
                        description: How many cards to add. A whole number of 1 or more.
                      customId:
                        $ref: "#/components/schemas/CustomId"
                        description: Your own stable identifier for this line, unique across your live
                          lines.
                      comment:
                        $ref: "#/components/schemas/InventoryComment"
                        description: Free-text note to attach to the line. Buyers see it when they view
                          your listing.
                      notes:
                        type: string
                        maxLength: 2000
                        description: Private note to attach to the line, visible only to you and never
                          shown to buyers.
                      location:
                        type: string
                        minLength: 1
                        maxLength: 100
                        description: The location to put this line in, by name. Must match one of your
                          existing locations (see `GET
                          /v1/inventory/locations`).
                      tags:
                        type: array
                        maxItems: 50
                        items:
                          type: string
                          minLength: 1
                          maxLength: 100
                          description: The label's name. Matched case-insensitively, with surrounding
                            spaces ignored — `Shelf A` and `shelf a` are the
                            same label.
                          examples:
                            - Trade binder
                        description: The tags to attach to this line, by name. Each must match one of
                          your existing tags (see `GET /v1/inventory/tags`).
                      listing:
                        type: object
                        properties:
                          price:
                            type: object
                            properties:
                              amount:
                                type: number
                                description: Decimal amount in the currency's major unit (e.g. `5.23` for
                                  €5.23). 2 decimal places for
                                  EUR/USD/GBP/CHF/CAD/AUD.
                              currency:
                                enum:
                                  - USD
                                  - EUR
                                  - GBP
                                  - CAD
                                  - CHF
                                  - SEK
                                  - DKK
                                  - NOK
                                  - PLN
                                  - HUF
                                type: string
                                x-enum-descriptions:
                                  USD: US Dollar.
                                  EUR: Euro.
                                  GBP: British Pound.
                                  CAD: Canadian Dollar.
                                  CHF: Swiss Franc.
                                  SEK: Swedish Krona.
                                  DKK: Danish Krone.
                                  NOK: Norwegian Krone.
                                  PLN: Polish Złoty.
                                  HUF: Hungarian Forint.
                            required:
                              - amount
                              - currency
                            description: The per-card price. The currency must match your seller currency.
                            examples:
                              - amount: 14.99
                                currency: USD
                        required:
                          - price
                        description: Publish the new line to the Marketplace right away at this price.
                          Omit to keep it in your Collection.
                    required:
                      - productId
                      - finish
                      - language
                      - quantity
                  description: The lines to add — between 1 and 1000 per call.
              required:
                - lines
