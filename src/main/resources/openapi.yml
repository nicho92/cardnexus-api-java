    patch:
      operationId: inventory.tags.update
      summary: Rename or recolor a tag
      description: >-
        Renames a tag or changes its display colour or icon. Send only the
        fields you want to change.


        Renaming keeps the tag attached to every line that already carries it —
        the lines follow the new name. A new name that clashes with another of
        your tags returns `CONFLICT`.


