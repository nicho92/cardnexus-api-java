  /inventory/bulk/export:
    post:
      operationId: inventory.bulkExport
      summary: Start a bulk export
      description: >-
        Exports your inventory lines to a gzip-compressed file. The export runs
        in the background: this call returns a job right away, and you poll `GET
        /v1/inventory/bulk/jobs/{jobId}` until `status` is `completed` and
        `downloadUrl` carries the link to the file. The file is kept for 7 days
        (the job's `expiresAt`).


        Exported files use the exact row layout `POST /v1/inventory/bulk/import`
        accepts — column set, condition values, prices in decimal major units —
        so a file can be exported, edited, and imported back. Each line's
        `comment`, `notes`, `location`, and `tags` are included; `location` is
        the location name and `tags` is a comma-separated list of names in CSV
        (an array in JSON). Each row's `productId` is the catalogue product's
        numeric id, as returned by `GET /v1/products`. Rows also carry
        informational columns next to `productId`: `name`, `expansion`, `url`,
        `game`, `printNumber`, `rarity`, and the finish-matched `cardmarketId`
        and `tcgplayerId` (the Cardmarket / TCGplayer product id for this line's
        own finish). These are ignored on import.


        Pass `filters` to export a subset — the same filters `GET /v1/inventory`
        accepts, plus `forSale`.


        Starting an export counts against the `inventory-export` rate limit: 1
        request every 10 minutes.


        Send an `Idempotency-Key` header to make retries safe: the same key
        returns the same response for 24 hours.


        Requires the `inventory:read` scope.
      tags:
        - Bulk operations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                format:
                  enum:
                    - json
                    - csv
                  type: string
                  description: "The file format to generate: `json` or `csv`."
                  x-enum-descriptions:
                    json: A JSON file.
                    csv: A CSV file.
                filters:
                  type: object
                  properties:
                    game:
                      type: string
                      minLength: 1
                      description: Return only lines for this game, given as a slug, e.g. `yugioh`.
                    productId:
                      type: array
                      items:
                        anyOf:
                          - type: number
                          - type: string
                            pattern: ^[0-9]+$
                        examples:
                          - 50212
                      description: Return only lines for these products. Repeat the parameter to pass
                        several. Product ids come from `GET /v1/products`.
                    condition:
                      $ref: "#/components/schemas/CardCondition"
                      description: "Return only lines in this condition: `NM`, `LP`, `MP`, `HP`, or
                        `DMG`."
                    language:
                      type: string
                      minLength: 1
                      description: Return only lines in this language, as a two-letter code, e.g.
                        `en`.
                    finish:
                      enum:
                        - Standard
                        - Foil
                        - Rainbow
                        - Gold
                        - Rainbow Foil
                        - Cold Foil
                        - Gold Foil
                        - Etched
                        - Signed
                        - Reverse Holo
                        - Blast Foil Rainbow
                        - Bubbles Foil
                        - Cracked Ice Foil
                        - Galaxy Foil
                        - Glitter Foil
                        - Multi Sideline Foil
                        - Rainbow Solid Texture Stamp
                        - Star Foil
                        - Surge Foil
                        - Full Art Gold Sign
                        - Depth Lenticular
                        - Flip Lenticular
                        - Lenticular
                        - Zarimoth
                        - Serialized
                        - Serialized Rose Gold
                        - Serialized Gold
                        - Holographic
                        - Embossed
                        - Holofoil
                      type: string
                      description: Return only lines with this finish, e.g. `Standard`, `Foil`,
                        `Reverse Holo`.
                      x-enum-descriptions:
                        Standard: A standard, non-foil card.
                        Foil: A foil card.
                        Reverse Holo: A card with a reverse-holofoil finish.
                        Etched: A card with an etched-foil finish.
                    graded:
                      type: boolean
                      description: "`true` returns only graded cards; `false` returns only raw cards.
                        Omit to return both."
                    customId:
                      type: string
                      minLength: 1
                      description: Return the line whose `customId` exactly equals this value.
                    customIdPrefix:
                      type: string
                      minLength: 1
                      description: Return lines whose `customId` starts with this value.
                    customIdContains:
                      type: string
                      minLength: 1
                      description: Return lines whose `customId` contains this value,
                        case-insensitively.
                    commentContains:
                      type: string
                      minLength: 1
                      description: Return lines whose `comment` contains this value,
                        case-insensitively.
                    forSale:
                      type: boolean
                      description: "`true` exports only lines published to the Marketplace; `false`
                        only lines in your Collection. Omit to export both."
                  description: Export only the lines matching these filters — the same filters
                    `GET /v1/inventory` accepts. Omit to export your whole
                    inventory.
              required:
                - format
      responses:
        "202":
          description: Export job accepted and queued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  job:
                    type: object
                    properties:
                      id:
                        type: string
                        description: The job's identifier. Pass it to `GET
                          /v1/inventory/bulk/jobs/{jobId}` to poll for progress
                          and results.
                      kind:
                        enum:
                          - import
                          - export
                        type: string
                        description: Whether this job is an `import` or an `export`.
                        x-enum-descriptions:
                          import: An import job.
                          export: An export job.
                      status:
                        enum:
                          - pending
                          - processing
                          - completed
                          - failed
                        type: string
                        description: "Where the job stands: `pending` (queued, not started),
                          `processing` (running), `completed` (finished —
                          results are ready), or `failed` (stopped before
                          finishing; see `errorMessage`)."
                        x-enum-descriptions:
                          pending: Queued, not started yet.
                          processing: Running.
                          completed: Finished successfully.
                          failed: Finished with a failure — see `errorMessage`.
                      format:
                        enum:
                          - json
                          - csv
                        type: string
                        description: "The file format the job reads or writes: `json` or `csv`."
                        x-enum-descriptions:
                          json: A JSON file.
                          csv: A CSV file.
                      mode:
                        anyOf:
                          - enum:
                              - upsert
                              - replace
                            type: string
                            description: "`upsert` applies the file's rows on top of your current inventory.
                              `replace` additionally sets every line the file
                              does not mention to a quantity of zero."
                            x-enum-descriptions:
                              upsert: Apply the file's rows on top of your current inventory.
                              replace: Apply the file, then set every line the file doesn't mention to a
                                quantity of zero.
                          - type: "null"
                        description: "Import jobs: `upsert` or `replace`. `null` on export jobs."
                      counts:
                        anyOf:
                          - type: object
                            properties:
                              total:
                                type: integer
                                minimum: -9007199254740991
                                maximum: 9007199254740991
                                description: How many rows the job covers.
                              succeeded:
                                type: integer
                                minimum: -9007199254740991
                                maximum: 9007199254740991
                                description: How many rows were processed successfully so far.
                              failed:
                                type: integer
                                minimum: -9007199254740991
                                maximum: 9007199254740991
                                description: How many rows failed so far. Failed import rows are listed in the
                                  error report at `errorReportUrl`.
                            required:
                              - total
                              - succeeded
                              - failed
                            examples:
                              - total: 1842
                                succeeded: 1839
                                failed: 3
                          - type: "null"
                        description: Row tallies, updated while the job runs. `null` until processing
                          starts.
                      progress:
                        anyOf:
                          - type: integer
                            minimum: 0
                            maximum: 100
                          - type: "null"
                        description: How far along the job is, from 0 to 100.
                      errorMessage:
                        anyOf:
                          - type: string
                          - type: "null"
                        description: Why the job failed, when `status` is `failed`. `null` otherwise.
                          Individual row failures do not fail the job — they go
                          to the error report instead.
                      downloadUrl:
                        anyOf:
                          - type: string
                          - type: "null"
                        description: "Export jobs: a temporary link to the generated file once the job
                          completes. The link stops working 15 minutes after it
                          was issued — fetch the job again for a fresh one.
                          `null` until then, and always `null` on import jobs."
                      errorReportUrl:
                        anyOf:
                          - type: string
                          - type: "null"
                        description: "Import jobs: a temporary link to a JSON report listing every
                          failed row (`row` index, `code`, `message`) once the
                          job completes with failures. The link stops working 15
                          minutes after it was issued — fetch the job again for
                          a fresh one. `null` when every row succeeded."
                      expiresAt:
                        anyOf:
                          - $ref: "#/components/schemas/DateString"
                          - type: "null"
                        description: When the job's files (export file, error report) are deleted — 7
                          days after completion. `null` while the job is still
                          running.
                      createdAt:
                        type: string
                        format: date-time
                        description: When the job was created.
                        examples:
                          - 2024-08-14T10:23:11.000Z
                    required:
                      - id
                      - kind
                      - status
                      - format
                      - mode
                      - counts
                      - progress
                      - errorMessage
                      - downloadUrl
                      - errorReportUrl
                      - expiresAt
                      - createdAt
                    description: The export job, queued for processing. Poll `GET
                      /v1/inventory/bulk/jobs/{jobId}` with its `id`.
                    examples:
                      - id: 6848a1b2c8d4e9f7a6b5c4d3
                        kind: export
                        status: completed
                        format: csv
                        mode: null
                        counts:
                          total: 1842
                          succeeded: 1842
                          failed: 0
                        progress: 100
                        errorMessage: null
                        downloadUrl: https://cardnexus-files.s3.eu-west-1.amazonaws.com/inventory-bulk-jobs/665f3a2b1c8d4e9f7a6b5c4d/6848a1b2c8d4e9f7a6b5c4d3/inventory-export.csv.gz?X-Amz-Expires=900&X-Amz-Signature=b27c...
                        errorReportUrl: null
                        expiresAt: 2026-06-17T09:15:31.000Z
                        createdAt: 2026-06-10T09:14:02.000Z
                      - id: 6848a3f0c8d4e9f7a6b5c4e1
                        kind: import
                        status: processing
                        format: json
                        mode: upsert
                        counts:
                          total: 12000
                          succeeded: 7996
                          failed: 4
                        progress: 66
                        errorMessage: null
                        downloadUrl: null
                        errorReportUrl: null
                        expiresAt: null
                        createdAt: 2026-06-10T09:20:45.000Z
                required:
                  - job
                examples:
                  - job:
                      id: 6848a1b2c8d4e9f7a6b5c4d3
                      kind: export
                      status: pending
                      format: csv
                      mode: null
                      counts: null
                      progress: 0
                      errorMessage: null
                      downloadUrl: null
                      errorReportUrl: null
                      expiresAt: null
                      createdAt: 2026-06-10T09:14:02.000Z
        "400":
          description: Request was malformed or failed validation.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    const: BAD_REQUEST
                  status:
