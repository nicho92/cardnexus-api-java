  /products/search:
    post:
      operationId: products.searchProducts
      summary: Search products
      description: >-
        Searches the catalogue. Returns a paginated list of products matching
        the body.


        Use this to find a card by name, browse an expansion, or filter on
        game-specific attributes like rarity or color. To replicate the full
        catalogue, use `GET /v1/feeds/products` instead — the feed is
        regenerated whenever a game's catalogue updates (typically minutes after
        a change).


        Filter fields:


        - `name` — free-text search against the product name, ranked by
        relevance.

        - `productIds`, `expansionId`, `nameSlug` — direct lookups when you
        already know the identifier.

        - `productType`, `productCategory` — restrict to cards or sealed (and a
        sealed category like `booster_box`).

        - `gameFilters` — pick a game (e.g. `{ "game": "mtg" }`), and optionally
        that game's own attribute filters in the same object.


        Pagination + sort:


        - `limit` defaults to 50, max 200. `offset` defaults to 0.

        - `sortBy`, `sortDirection` — sort the results.


        Each result has `productType` set to either `card` or `sealed`. Card
        products carry per-finish prices and per-game attributes; sealed
        products carry a single price plus EAN/SKU.


        This endpoint has its own rate-limit bucket (`catalogue-search`);
        paginating through tens of thousands of results will hit it before your
        account-level limit. The daily feeds are the right tool for bulk
        catalogue replication.


        Authentication is required (any valid API key); no scope.
      tags:
        - Products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                offset:
                  type: integer
                  minimum: 0
                  maximum: 9007199254740991
                  default: 0
                limit:
                  type: integer
                  minimum: 1
                  maximum: 200
                  default: 50
                productIds:
                  type: array
                  minItems: 1
                  items:
                    anyOf:
                      - type: number
                      - type: string
                        pattern: ^[0-9]+$
                    examples:
                      - 50212
                  description: Restrict results to a specific set of product ids. Useful for batch
                    lookups when you already know which products you want.
                expansionId:
                  anyOf:
                    - type: number
                    - type: string
                      pattern: ^[0-9]+$
                  description: Restrict results to a single expansion. Returned by `GET
                    /v1/games/{gameId}/expansions`.
                  examples:
                    - 42
                name:
                  type: string
                  minLength: 1
                  description: Free-text search. Matches against the product name with relevance
                    ranking — the closer the match, the higher the result.
                nameSlug:
                  type: string
                  minLength: 1
                  description: Exact match against the product's `nameSlug`. Use for direct lookup
                    when you already know the slug.
                cardmarketId:
                  type: array
                  minItems: 1
                  maxItems: 200
                  items:
                    type: integer
                    minimum: 0
                    maximum: 9007199254740991
                  description: Restrict results to products carrying any of these Cardmarket
                    product ids (1–200), returned with full details. Use this to
                    fetch details for ids you already know; to turn a list of
                    ids into products and learn which ones don't match, use
                    `POST /v1/products/resolve`.
                tcgplayerId:
                  type: array
                  minItems: 1
                  maxItems: 200
                  items:
                    type: integer
                    minimum: 0
                    maximum: 9007199254740991
                  description: Restrict results to products carrying any of these TCGplayer
                    product ids (1–200), returned with full details. To turn a
                    list of ids into products and learn which ones don't match,
                    use `POST /v1/products/resolve`.
                productType:
                  type: object
                  properties:
                    op:
                      enum:
                        - and
                        - or
                      type: string
                      x-enum-descriptions:
                        and: Match items that meet all of the listed conditions.
                        or: Match items that meet any of the listed conditions.
                    values:
                      type: array
                      items:
                        enum:
                          - card
                          - sealed
                        type: string
                        x-enum-descriptions:
                          card: A single card.
                          sealed: A sealed product, such as a booster box or bundle.
                  required:
                    - op
                    - values
                  description: 'Restrict to one or more product types — `{ op: "or", values:
