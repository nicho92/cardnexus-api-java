  /inventory/{inventoryId}/media:
    put:
      operationId: inventory.setMedia
      summary: Set an inventory line's photos
      description: >-
        Replaces the photos attached to an inventory line. Buyers see these
        photos on your Marketplace listing for the line.


        Send the request as `multipart/form-data` with each photo in the `files`
        field — between 1 and 10 images, any `image/*` content type, up to 10 MB
        each. The whole set is replaced in one call: include every photo the
        line should keep. A file that cannot be read as an image is rejected
        with `BAD_REQUEST`.


        Requires the `inventory:write` scope.
      tags:
        - Lines
      parameters:
        - name: inventoryId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            description: The inventory line's identifier. Returned by `GET /v1/inventory`.
              Path parameter.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                files:
                  type: array
                  minItems: 1
                  maxItems: 10
                  items:
                    type: string
                    contentMediaType: "*/*"
                  description: The photos the line should carry — between 1 and 10 image files,
                    any `image/*` content type, each up to 10 MB.
              required:
                - files
