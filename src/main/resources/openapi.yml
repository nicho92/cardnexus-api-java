  /products/{productId}:
    get:
      operationId: products.getProduct
      summary: Get a product
      description: >-
        Returns a single product by its identifier, including cross-platform IDs
        that map this product to its Cardmarket and TCGplayer equivalents.


        The response is a discriminated union by `productType` (`card` or
        `sealed`).


        Authentication is required (any valid API key); no scope.
      tags:
        - Products
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            anyOf:
              - type: number
              - type: string
                pattern: ^[0-9]+$
            description: The product's identifier. Returned by `GET /v1/products` and `GET
              /v1/products/{productId}`.
            examples:
              - 50212
      responses:
        "200":
          description: Product returned.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: "#/components/schemas/CardProductDetail"
                  - $ref: "#/components/schemas/SealedProductDetail"
                examples:
                  - id: 50212
                    gameId: mtg
                    expansionId: 42
                    name: Black Lotus
                    imageUrl: https://images.cardnexus.com/products/mtg/lea/black-lotus-front.jpg
                    productType: card
                    printNumber: "232"
                    rarity: rare
                    finishes:
                      - Standard
                    attributes:
                      manaCost: "{0}"
                      colors: []
                      typeLine: Artifact
                    externalIds:
