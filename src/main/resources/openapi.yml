    patch:
      operationId: listings.update
      summary: Change a listing's price
      description: >-
        Changes the per-card price of a listed inventory line. The price is the
        only thing this endpoint changes — how many cards are for sale is a
        property of the line itself: list more via `POST
        /v1/inventory/{inventoryId}/listing` or take some off sale via `DELETE
        /v1/inventory/{inventoryId}/listing`.


        If the new price makes this line identical to another of your listed
        lines (same product, finish, condition, language, grading, and price,
        neither line carrying a `customId`), the two merge; the response is the
        surviving line.


        Send an `Idempotency-Key` header to make retries safe: the same key
        returns the same response for 24 hours.


        Requires the `listings:write` scope.
      tags:
        - Listings
      parameters:
        - name: inventoryId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            description: The listed inventory line. Returned by `GET /v1/listings`. Path
              parameter.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                price:
                  type: object
                  properties:
                    amount:
                      type: number
                      description: Decimal amount in the currency's major unit (e.g. `5.23` for
                        €5.23). 2 decimal places for EUR/USD/GBP/CHF/CAD/AUD.
                    currency:
                      enum:
                        - USD
                        - EUR
                        - GBP
                        - CAD
                        - CHF
                        - SEK
                        - DKK
                        - NOK
                        - PLN
                        - HUF
                      type: string
                      x-enum-descriptions:
                        USD: US Dollar.
                        EUR: Euro.
                        GBP: British Pound.
                        CAD: Canadian Dollar.
                        CHF: Swiss Franc.
                        SEK: Swedish Krona.
                        DKK: Danish Krone.
                        NOK: Norwegian Krone.
                        PLN: Polish Złoty.
                        HUF: Hungarian Forint.
                  required:
                    - amount
                    - currency
                  description: The new per-card price. The currency must match the listing's
                    currency.
                  examples:
                    - amount: 14.99
                      currency: USD
              required:
                - price
      responses:
        "200":
          description: Listing price changed; the updated line is returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Stable opaque identifier for this inventory line. Do not parse.
                  customId:
                    anyOf:
                      - $ref: "#/components/schemas/CustomId"
                      - type: "null"
                    description: Your own stable identifier for this line, unique across your live
                      lines. `null` when you have not set one.
                  comment:
                    anyOf:
                      - type: string
                      - type: "null"
                    description: Free-text note attached to this line, shown to buyers on your
                      Marketplace listing. `null` when there is none.
                  notes:
                    anyOf:
                      - type: string
                      - type: "null"
                    description: Your private note on this line, visible only to you and never shown
                      to buyers. `null` when there is none.
                  location:
                    anyOf:
                      - type: string
                      - type: "null"
                    description: The name of the location this line sits in. `null` when it has
                      none.
                  tags:
                    type: array
                    items:
                      type: string
                    description: The names of the tags attached to this line. Empty when the line
                      has no tags.
                  productId:
                    type: integer
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                    description: The catalogue product this line stocks. Returned by `GET
                      /v1/products`.
                    examples:
                      - 50212
                  game:
                    type: string
                    description: The game the product belongs to, as a slug, e.g. `yugioh`.
                  finish:
                    type: string
                    description: The card's finish, e.g. `Standard`, `Foil`, `Reverse Holo`.
                  condition:
                    anyOf:
                      - $ref: "#/components/schemas/CardCondition"
                      - type: "null"
                    description: "The card's condition: `NM`, `LP`, `MP`, `HP`, or `DMG`. `null`
                      when the card is graded."
                  language:
                    anyOf:
                      - type: string
                      - type: "null"
                    description: The card's language as a two-letter code, e.g. `en`, `fr`, `de`.
                  quantity:
                    type: integer
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                    description: How many cards this line holds.
                  graded:
                    anyOf:
                      - $ref: "#/components/schemas/Graded"
                      - type: "null"
                    description: Grading details when the card is graded. `null` for raw cards.
                  forSale:
                    type: boolean
                    description: "`true` when this line is published to the Marketplace with a
                      price. `false` when it sits in your Collection."
                  listing:
                    anyOf:
                      - type: object
                        properties:
                          price:
                            $ref: "#/components/schemas/Money"
                        required:
                          - price
                        examples:
                          - price:
                              amount: 42.5
                              currency: EUR
                      - type: "null"
                    description: The listing details when `forSale` is `true`. `null` when the line
                      is not for sale.
                  updatedAt:
                    type: string
                    format: date-time
                    description: When this line was last modified.
                    examples:
                      - 2024-08-14T10:23:11.000Z
                required:
                  - id
                  - customId
                  - comment
                  - notes
                  - location
                  - tags
                  - productId
                  - game
                  - finish
                  - condition
                  - language
                  - quantity
                  - graded
                  - forSale
                  - listing
                  - updatedAt
                examples:
                  - id: 665f3a2b1c8d4e9f7a6b5c4d
                    customId: YRG|5555-5DS1-2EX-006-f-2-2008-08-01
                    comment: Slight edge wear on the back corner
