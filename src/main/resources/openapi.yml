    delete:
      operationId: listings.delete
      summary: Take a listing off sale
      description: >-
        Takes a listed inventory line off the Marketplace. The cards stay in
        your inventory — they move back to your Collection.


        By default the whole listing is cancelled and the response is the line's
        new state in your Collection. Pass `quantity` to take only part of it
        off sale: the delisted cards move back to your Collection, the rest
        stays for sale on this line, and the response is this line's new,
        reduced state.


        Delisted cards merge into an identical unlisted line of yours when one
        exists (same product, finish, condition, language, and grading, neither
        line carrying a `customId`). After a full delist that merges, the
        response is the surviving line.


        Requires the `listings:write` scope.
      tags:
        - Listings
      parameters:
        - name: inventoryId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            description: The listed inventory line. Returned by `GET /v1/listings`. Path
              parameter.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity:
                  type: integer
                  minimum: 1
                  maximum: 9007199254740991
                  description: How many cards to take off sale. Defaults to all of them. Query
                    parameter.
              required: []
      responses:
        "200":
          description: Listing cancelled; the line's new state is returned.
