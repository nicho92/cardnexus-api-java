        externalIds:
          $ref: "#/components/schemas/ExternalIds"
          description: This product's ids on Cardmarket and TCGplayer, one per finish.
            Absent when the product carries no marketplace mapping. Use them to
            bridge with your existing Cardmarket / TCGplayer integration.
        productType:
          const: sealed
        productCategory:
          type: string
          description: What kind of sealed product this is (e.g. `booster_box`,
            `booster_pack`, `bundle`, `prerelease_kit`, `commander_deck`,
            `starter_deck`).
        ean:
          type: string
          description: European Article Number (EAN-13). Useful for matching against POS
            scans.
        sku:
          type: string
          description: Manufacturer SKU.
        releaseDate:
          $ref: "#/components/schemas/DateString"
          description: When the sealed product was released (ISO 8601, UTC).
        prices:
          type: object
          properties:
            eur:
              type: object
              properties:
                low:
                  type: number
                  minimum: 0
                  description: Lowest observed price (decimal major units).
                mid:
                  type: number
                  minimum: 0
                  description: Median observed price (decimal major units).
                high:
                  type: number
                  minimum: 0
                  description: Highest observed price (decimal major units).
                marketValue:
                  type: number
                  minimum: 0
                  description: Aggregate market price — what we display as the canonical price
                    (decimal major units).
                change24h:
                  anyOf:
                    - type: number
                    - type: "null"
                  description: Percent change of `marketValue` vs. 24 hours ago. `null` when
                    there's not enough history.
                change7d:
                  anyOf:
                    - type: number
                    - type: "null"
                  description: Percent change of `marketValue` vs. 7 days ago.
                change30d:
                  anyOf:
                    - type: number
                    - type: "null"
                  description: Percent change of `marketValue` vs. 30 days ago.
              description: Pricing in Euros. Absent when no EUR data is available.
            usd:
              type: object
              properties:
                low:
                  type: number
                  minimum: 0
                  description: Lowest observed price (decimal major units).
                mid:
                  type: number
                  minimum: 0
                  description: Median observed price (decimal major units).
                high:
                  type: number
                  minimum: 0
                  description: Highest observed price (decimal major units).
                marketValue:
                  type: number
                  minimum: 0
                  description: Aggregate market price — what we display as the canonical price
                    (decimal major units).
                change24h:
                  anyOf:
                    - type: number
                    - type: "null"
                  description: Percent change of `marketValue` vs. 24 hours ago. `null` when
                    there's not enough history.
                change7d:
                  anyOf:
                    - type: number
                    - type: "null"
                  description: Percent change of `marketValue` vs. 7 days ago.
                change30d:
                  anyOf:
                    - type: number
                    - type: "null"
                  description: Percent change of `marketValue` vs. 30 days ago.
              description: Pricing in US Dollars. Absent when no USD data is available.
          description: Current market price snapshot. A sealed product has a single price
            (no per-finish split).
          examples:
            - eur:
                low: 14999
                mid: 17500
                high: 32500
                marketValue: 18250
                change24h: 0.4
                change7d: -1.2
                change30d: 5.7
              usd:
                low: 16450
                mid: 19250
                high: 35200
                marketValue: 20100
                change24h: 0.3
                change7d: -0.9
                change30d: 6.1
      required:
        - id
        - gameId
        - game
        - name
        - nameSlug
        - languages
        - productType
        - productCategory
        - prices
      examples:
        - id: 50213
          gameId: pokemon
          expansionId: 87
          game:
            id: pokemon
            name: Pokémon Trading Card Game
          expansion:
            id: 87
            name: Stellar Crown
            code: SV4
            symbolUrl: https://images.cardnexus.com/expansions/pokemon/sv4/symbol.svg
          name: Stellar Crown — Booster Box
          nameSlug: stellar-crown-booster-box
          languages:
            - en
          imageUrl: https://images.cardnexus.com/products/pokemon/sv4/stellar-crown-booster-box.jpg
          productType: sealed
          productCategory: booster_box
          ean: "0820650558849"
          releaseDate: 2024-09-13T00:00:00.000Z
          prices:
            eur:
              low: 124.5
              mid: 132
              high: 145
              marketValue: 132.5
              change24h: 0.2
              change7d: 1.4
              change30d: -2.1
            usd:
              low: 134.99
              mid: 142
              high: 159
              marketValue: 143
              change24h: 0.1
              change7d: 1.6
              change30d: -1.8
