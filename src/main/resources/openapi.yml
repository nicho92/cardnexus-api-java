                recipientRole:
                  enum:
                    - seller
                    - buyer
                  type: string
                  description: Whether this delivery is for the seller or the buyer side of the
                    order. The same transition produces two deliveries — one to
                    each role.
                  x-enum-descriptions:
                    seller: You received this because you're the seller.
                    buyer: You received this because you're the buyer.
                data:
                  type: object
                  properties:
                    orderNumber:
                      type: string
                      description: Stable order identifier (e.g. `OR-ASNBC-1`).
                    status:
                      enum:
                        - pending_shipment
                        - cancellation_requested
                        - cancelled_buyer
                        - cancelled_seller
                        - cancelled_auto
                        - shipped
                        - delivered
                        - completed
                        - dispute_open
                        - dispute_escalated
                        - resolved_full_refund
                        - resolved_partial_refund
                        - resolved_no_refund
                        - resolved_return
                        - resolved_goodwill_refund
                      type: string
                      description: The order's new status.
                      examples:
                        - shipped
                      x-enum-descriptions:
                        pending_shipment: Awaiting dispatch.
                        cancellation_requested: The buyer asked to cancel; awaiting a response.
                        cancelled_buyer: Cancelled — the buyer's cancellation was accepted.
                        cancelled_seller: Cancelled by the seller.
                        cancelled_auto: Cancelled automatically by CardNexus.
                        shipped: On its way to the buyer.
                        delivered: Delivered to the buyer.
                        completed: Closed and paid out.
                        dispute_open: A dispute is open on the order.
                        dispute_escalated: The dispute was escalated to CardNexus.
                        resolved_full_refund: Dispute resolved with a full refund.
                        resolved_partial_refund: Dispute resolved with a partial refund.
                        resolved_no_refund: Dispute resolved with no refund.
                        resolved_return: Dispute resolved with a return.
                        resolved_goodwill_refund: Dispute resolved with a goodwill refund.
                    previousStatus:
                      anyOf:
                        - enum:
                            - pending_shipment
                            - cancellation_requested
                            - cancelled_buyer
                            - cancelled_seller
                            - cancelled_auto
                            - shipped
                            - delivered
                            - completed
                            - dispute_open
                            - dispute_escalated
                            - resolved_full_refund
                            - resolved_partial_refund
                            - resolved_no_refund
                            - resolved_return
                            - resolved_goodwill_refund
                          type: string
                          description: Where the order is in its lifecycle. `pending_shipment` is awaiting
                            dispatch; `shipped` and `delivered` track the
                            parcel; `completed` is closed and paid out;
                            `cancelled_*` and `resolved_*` are the terminal
                            cancellation and dispute outcomes.
                          examples:
                            - shipped
                          x-enum-descriptions:
                            pending_shipment: Awaiting dispatch.
                            cancellation_requested: The buyer asked to cancel; awaiting a response.
                            cancelled_buyer: Cancelled — the buyer's cancellation was accepted.
                            cancelled_seller: Cancelled by the seller.
                            cancelled_auto: Cancelled automatically by CardNexus.
                            shipped: On its way to the buyer.
                            delivered: Delivered to the buyer.
                            completed: Closed and paid out.
                            dispute_open: A dispute is open on the order.
                            dispute_escalated: The dispute was escalated to CardNexus.
                            resolved_full_refund: Dispute resolved with a full refund.
                            resolved_partial_refund: Dispute resolved with a partial refund.
                            resolved_no_refund: Dispute resolved with no refund.
                            resolved_return: Dispute resolved with a return.
                            resolved_goodwill_refund: Dispute resolved with a goodwill refund.
                        - type: "null"
                      description: The status the order moved from. `null` for the order's very first
                        status.
                    changedAt:
                      type: string
                      format: date-time
                      description: When the status changed.
                      examples:
                        - 2024-08-14T10:23:11.000Z
                    reason:
                      anyOf:
                        - type: string
                        - type: "null"
                      description: Why the status changed, when one applies (e.g. a cancellation or
                        dispute reason). `null` otherwise.
                  required:
                    - orderNumber
                    - status
                    - previousStatus
                    - changedAt
                    - reason
                  description: The order's new status and where it moved from.
              required:
                - type
                - eventId
                - timestamp
                - recipientRole
                - data
              examples:
                - type: order.status.changed
                  eventId: OR-ASNBC-1.3.seller
                  timestamp: 2026-06-14T09:12:00.000Z
                  recipientRole: seller
                  data:
                    orderNumber: OR-ASNBC-1
                    status: shipped
                    previousStatus: pending_shipment
                    changedAt: 2026-06-14T09:12:00.000Z
                    reason: null
      responses:
        2XX:
          description: Acknowledged. Return any 2XX status to ack receipt; non-2XX
            triggers Svix's retry schedule.
  message.received:
    post:
      summary: Message received
      description: Fires when you receive a chat message (from the other party, or
        from CardNexus support). Metadata only — no message text; fetch the
        conversation to read it. `data.context` is a discriminated union keyed
        on `type`; today it is always `order`, and new conversation types are
        added there without breaking your integration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  const: message.received
                eventId:
                  type: string
                  description: Idempotency key. Stable across retries of the same delivery; safe
                    to dedupe on.
                timestamp:
                  type: string
                  format: date-time
                  description: When this webhook was emitted (ISO 8601, UTC).
                  examples:
                    - 2024-08-14T10:23:11.000Z
                data:
                  type: object
                  properties:
                    threadId:
                      type: string
                      description: Opaque identifier for the conversation the message belongs to.
                        Treat it as a stable token — don't parse it.
                    messageId:
                      type: string
                      description: Opaque identifier for the message.
                    context:
                      anyOf:
                        - type: object
                          properties:
                            type:
                              const: order
                            orderNumber:
                              type: string
                              description: The order the conversation is attached to.
                            scope:
                              enum:
                                - main
                                - support
                              type: string
                              description: "`main` is your conversation with the other party; `support` is
                                your conversation with CardNexus support."
                              x-enum-descriptions:
                                main: The order's main conversation between buyer and seller.
                                support: The support conversation with CardNexus.
                            yourRole:
                              enum:
                                - buyer
                                - seller
                              type: string
                              description: Your side of the order.
                              x-enum-descriptions:
                                seller: You received this because you're the seller.
                                buyer: You received this because you're the buyer.
                          required:
                            - type
                            - orderNumber
                            - scope
                            - yourRole
                      description: "What the conversation is about. Always `type: \"order\"` today;
                        switch on `context.type` so new conversation types added
                        later don't break your integration."
                    sender:
                      type: object
                      properties:
                        username:
                          type: string
                          description: The handle of whoever sent the message. CardNexus support appears
                            as `cardnexus_support`.
                      required:
                        - username
                    sentAt:
                      type: string
                      format: date-time
                      description: When the message was sent.
                      examples:
                        - 2024-08-14T10:23:11.000Z
                    hasAttachments:
                      type: boolean
                      description: Whether the message carries one or more attachments.
                  required:
                    - threadId
                    - messageId
                    - context
                    - sender
                    - sentAt
                    - hasAttachments
                  description: Who sent the message and which conversation it belongs to.
              required:
                - type
                - eventId
                - timestamp
                - data
              examples:
                - type: message.received
                  eventId: e5f0a1b2c3d4e5f6a7b8c9d0
                  timestamp: 2026-06-14T10:00:03.000Z
                  data:
                    threadId: b3JkZXI6T1ItQVNOQkMtMTptYWlu
                    messageId: e5f0a1b2c3d4e5f6a7b8c9d0
                    context:
                      type: order
                      orderNumber: OR-ASNBC-1
                      scope: main
                      yourRole: seller
                    sender:
                      username: north_arena_tcg
                    sentAt: 2026-06-14T10:00:00.000Z
                    hasAttachments: false
      responses:
        2XX:
          description: Acknowledged. Return any 2XX status to ack receipt; non-2XX
            triggers Svix's retry schedule.
  balance.updated:
    post:
      summary: Wallet balance changed
      description: Fires when your wallet balance changes — after a sale, a payout, or
        a refund. Carries the new `available` and `pending` amounts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  const: balance.updated
                eventId:
                  type: string
                  description: Idempotency key. Stable across retries of the same delivery; safe
                    to dedupe on.
                timestamp:
                  type: string
                  format: date-time
                  description: When this webhook was emitted (ISO 8601, UTC).
                  examples:
                    - 2024-08-14T10:23:11.000Z
                data:
                  type: object
                  properties:
                    available:
                      type: object
                      properties:
                        amount:
                          type: number
                          description: Decimal amount in the currency's major unit (e.g. `5.23` for
                            €5.23). 2 decimal places for
                            EUR/USD/GBP/CHF/CAD/AUD.
                        currency:
                          enum:
                            - USD
                            - EUR
                            - GBP
                            - CAD
                            - CHF
                            - SEK
                            - DKK
                            - NOK
                            - PLN
                            - HUF
                          type: string
                          x-enum-descriptions:
                            USD: US Dollar.
                            EUR: Euro.
                            GBP: British Pound.
                            CAD: Canadian Dollar.
                            CHF: Swiss Franc.
                            SEK: Swedish Krona.
                            DKK: Danish Krone.
                            NOK: Norwegian Krone.
                            PLN: Polish Złoty.
                            HUF: Hungarian Forint.
                      required:
                        - amount
                        - currency
                      description: Funds available to be paid out to your bank account.
                      examples:
                        - amount: 14.99
                          currency: USD
                    pending:
                      type: object
                      properties:
                        amount:
                          type: number
                          description: Decimal amount in the currency's major unit (e.g. `5.23` for
                            €5.23). 2 decimal places for
                            EUR/USD/GBP/CHF/CAD/AUD.
                        currency:
                          enum:
                            - USD
                            - EUR
                            - GBP
                            - CAD
                            - CHF
                            - SEK
                            - DKK
                            - NOK
                            - PLN
                            - HUF
                          type: string
                          x-enum-descriptions:
                            USD: US Dollar.
                            EUR: Euro.
                            GBP: British Pound.
                            CAD: Canadian Dollar.
                            CHF: Swiss Franc.
                            SEK: Swedish Krona.
                            DKK: Danish Krone.
                            NOK: Norwegian Krone.
                            PLN: Polish Złoty.
                            HUF: Hungarian Forint.
                      required:
                        - amount
                        - currency
                      description: Funds from recent sales still clearing, not yet available to pay
                        out.
                      examples:
                        - amount: 14.99
                          currency: USD
                    updatedAt:
                      type: string
                      format: date-time
                      description: When this balance was last refreshed from the payment processor.
                      examples:
                        - 2024-08-14T10:23:11.000Z
                  required:
                    - available
                    - pending
                    - updatedAt
                  description: Your wallet balance after the change.
              required:
                - type
                - eventId
                - timestamp
                - data
              examples:
                - type: balance.updated
                  eventId: 665f3a2b1c8d4e9f7a6b5c4d.12840.4210
                  timestamp: 2026-06-18T08:00:01.000Z
                  data:
                    available:
                      amount: 128.4
                      currency: EUR
                    pending:
                      amount: 42.1
                      currency: EUR
                    updatedAt: 2026-06-18T08:00:00.000Z
      responses:
        2XX:
          description: Acknowledged. Return any 2XX status to ack receipt; non-2XX
            triggers Svix's retry schedule.
  inventory.quantity.changed:
    post:
      summary: Inventory quantities changed
      description: Fires when the quantity on one or more of your inventory lines
        changes — after a sale, an order cancellation, an import, a direct edit,
        or a listing operation. Each delivery carries up to 500 changed lines;
        larger change sets are split across several deliveries, each with its
        own `eventId`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  const: inventory.quantity.changed
                eventId:
                  type: string
                  description: Idempotency key. Stable across retries of the same delivery; safe
                    to dedupe on. When a change set is split across several
                    deliveries, each delivery has its own eventId.
                timestamp:
                  type: string
                  format: date-time
                  description: When this webhook was emitted (ISO 8601, UTC).
                  examples:
                    - 2024-08-14T10:23:11.000Z
                data:
                  type: object
                  properties:
                    reason:
                      enum:
                        - order
                        - order_cancelled
                        - import
                        - edit
                        - listing
                      type: string
                      description: What caused the change. `order` — a sale reduced your stock.
                        `order_cancelled` — a cancelled order put stock back.
                        `import` — a bulk import ran. `edit` — your inventory
                        was edited directly. `listing` — a listing operation
                        changed quantities.
                      x-enum-descriptions:
                        order: A sale reduced your stock.
                        order_cancelled: A cancelled order put stock back.
                        import: A bulk import ran.
                        edit: Your inventory was edited directly.
                        listing: A listing operation changed quantities.
                    changes:
                      type: array
                      items:
                        type: object
                        properties:
                          inventoryId:
                            type: string
                            description: The inventory line's unique identifier.
                          customId:
                            anyOf:
                              - type: string
                              - type: "null"
                            description: Your own identifier for this line, if you've set one. `null`
                              otherwise.
                          productId:
                            type: integer
                            minimum: -9007199254740991
                            maximum: 9007199254740991
                            description: The catalogue product this line stocks.
                            examples:
                              - 50212
                          before:
                            type: integer
                            minimum: 0
                            maximum: 9007199254740991
                            description: Quantity on the line before the change.
                          after:
                            type: integer
                            minimum: 0
                            maximum: 9007199254740991
                            description: Quantity on the line after the change.
                        required:
                          - inventoryId
                          - customId
                          - productId
                          - before
                          - after
                      description: One entry per inventory line whose quantity changed. Lines whose
                        quantity stayed the same are not included. Each delivery
                        carries up to 500 entries; larger change sets arrive as
                        several deliveries.
                  required:
                    - reason
                    - changes
                  description: The quantity changes and what caused them.
              required:
                - type
                - eventId
                - timestamp
                - data
              examples:
                - type: inventory.quantity.changed
                  eventId: 9c41be2f3a07d815-0
                  timestamp: 2026-06-02T09:41:27.000Z
                  data:
                    reason: order
                    changes:
                      - inventoryId: 665f3a2b1c8d4e9f7a6b5c4d
                        customId: YRG|5555-5DS1-2EX-006-f-2-2008-08-01
                        productId: 50212
                        before: 4
                        after: 3
                      - inventoryId: 665f3a2b1c8d4e9f7a6b5c4e
                        customId: null
                        productId: 50213
                        before: 12
                        after: 10
      responses:
        2XX:
          description: Acknowledged. Return any 2XX status to ack receipt; non-2XX
            triggers Svix's retry schedule.
  inventory.import.completed:
    post:
      summary: Inventory import finished
      description: Fires when one of your inventory import jobs finishes, whether it
        completed or failed. Includes per-row counts and, when there is one, a
        link to the error report.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  const: inventory.import.completed
                eventId:
                  type: string
                  description: Idempotency key. Stable across retries of the same delivery; safe
                    to dedupe on.
                timestamp:
                  type: string
                  format: date-time
                  description: When this webhook was emitted (ISO 8601, UTC).
                  examples:
                    - 2024-08-14T10:23:11.000Z
                data:
                  anyOf:
                    - type: object
                      properties:
                        jobId:
                          type: string
                          description: The import job's unique identifier, as returned when you started
                            the import.
                        status:
                          const: completed
                          description: The import job completed.
                        counts:
                          type: object
                          properties:
                            total:
                              type: integer
                              minimum: 0
                              maximum: 9007199254740991
                              description: Total number of rows in the file you submitted.
                            succeeded:
                              type: integer
                              minimum: 0
                              maximum: 9007199254740991
                              description: Rows that were imported.
                            failed:
                              type: integer
                              minimum: 0
                              maximum: 9007199254740991
                              description: Rows that could not be imported.
                          required:
                            - total
                            - succeeded
                            - failed
                          description: Per-row outcome of the import.
                        errorReportUrl:
                          anyOf:
                            - type: string
                            - type: "null"
                          description: A time-limited link to a report describing the rows that could not
                            be imported. `null` when every row succeeded.
                      required:
                        - jobId
                        - status
                        - counts
                        - errorReportUrl
                      examples:
                        - jobId: 6842f1c09b3a5d7e2c4b8a1f
                          status: completed
                          counts:
                            total: 1842
                            succeeded: 1836
                            failed: 6
                          errorReportUrl: https://cardnexus-bulk-jobs.s3.eu-west-1.amazonaws.com/imports/6842f1c09b3a5d7e2c4b8a1f/error-report.json?X-Amz-Expires=3600&X-Amz-Signature=4e9a...
                    - type: object
                      properties:
                        jobId:
                          type: string
                          description: The import job's unique identifier, as returned when you started
                            the import.
                        status:
                          const: failed
                          description: The import job failed — the file could not be processed.
                        counts:
                          type: object
                          properties:
                            total:
                              type: integer
                              minimum: 0
                              maximum: 9007199254740991
                              description: Total number of rows in the file you submitted.
                            succeeded:
                              type: integer
                              minimum: 0
                              maximum: 9007199254740991
                              description: Rows that were imported.
                            failed:
                              type: integer
                              minimum: 0
                              maximum: 9007199254740991
                              description: Rows that could not be imported.
                          required:
                            - total
                            - succeeded
                            - failed
                          description: Per-row outcome of the import.
                        errorReportUrl:
                          type: "null"
                          description: "Always `null`: a failed import produces no row report."
                      required:
                        - jobId
                        - status
                        - counts
                        - errorReportUrl
                      examples:
                        - jobId: 6842f1c09b3a5d7e2c4b8a1f
                          status: failed
                          counts:
                            total: 0
                            succeeded: 0
                            failed: 0
                          errorReportUrl: null
                  description: "The finished import job. `status` tells the two shapes apart: a
                    `completed` job carries per-row counts and, when rows
                    failed, an error-report link; a `failed` job carries a
                    `null` report link."
              required:
                - type
                - eventId
                - timestamp
                - data
              examples:
                - type: inventory.import.completed
                  eventId: 6842f1c09b3a5d7e2c4b8a1f.completed
                  timestamp: 2026-06-02T09:48:03.000Z
                  data:
                    jobId: 6842f1c09b3a5d7e2c4b8a1f
                    status: completed
                    counts:
                      total: 1842
                      succeeded: 1836
                      failed: 6
                    errorReportUrl: https://cardnexus-bulk-jobs.s3.eu-west-1.amazonaws.com/imports/6842f1c09b3a5d7e2c4b8a1f/error-report.json?X-Amz-Expires=3600&X-Amz-Signature=4e9a...
                - type: inventory.import.completed
                  eventId: 6842f2b54a7c8d1e3f5b9c20.completed
                  timestamp: 2026-06-02T09:53:17.000Z
                  data:
                    jobId: 6842f2b54a7c8d1e3f5b9c20
                    status: failed
                    counts:
                      total: 0
                      succeeded: 0
                      failed: 0
                    errorReportUrl: null
      responses:
        2XX:
          description: Acknowledged. Return any 2XX status to ack receipt; non-2XX
            triggers Svix's retry schedule.
  inventory.export.completed:
    post:
      summary: Inventory export finished
      description: Fires when one of your inventory export jobs finishes. A completed
        export includes a time-limited download link for the file.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  const: inventory.export.completed
                eventId:
                  type: string
                  description: Idempotency key. Stable across retries of the same delivery; safe
                    to dedupe on.
                timestamp:
                  type: string
                  format: date-time
                  description: When this webhook was emitted (ISO 8601, UTC).
                  examples:
                    - 2024-08-14T10:23:11.000Z
                data:
                  anyOf:
                    - type: object
                      properties:
                        jobId:
                          type: string
                          description: The export job's unique identifier, as returned when you started
                            the export.
                        status:
                          const: completed
                          description: The export job completed.
                        downloadUrl:
                          type: string
                          description: A time-limited link to download the exported file. It stops working
                            at `expiresAt`.
                        expiresAt:
                          type: string
                          format: date-time
                          description: When `downloadUrl` stops working.
                          examples:
                            - 2024-08-14T10:23:11.000Z
                      required:
                        - jobId
                        - status
                        - downloadUrl
                        - expiresAt
                      examples:
                        - jobId: 6842f4a87d1e9b3c5f2a6d04
                          status: completed
                          downloadUrl: https://cardnexus-bulk-jobs.s3.eu-west-1.amazonaws.com/exports/6842f4a87d1e9b3c5f2a6d04/inventory.csv.gz?X-Amz-Expires=3600&X-Amz-Signature=b27c...
                          expiresAt: 2026-06-02T11:12:46.000Z
                    - type: object
                      properties:
                        jobId:
                          type: string
                          description: The export job's unique identifier, as returned when you started
                            the export.
                        status:
                          const: failed
                          description: The export job failed.
                        downloadUrl:
                          type: "null"
                          description: "Always `null`: a failed export produces no file."
                        expiresAt:
                          type: "null"
                          description: "Always `null`: there is no download link to expire."
                      required:
                        - jobId
                        - status
                        - downloadUrl
                        - expiresAt
                      examples:
                        - jobId: 6842f4a87d1e9b3c5f2a6d04
                          status: failed
                          downloadUrl: null
                          expiresAt: null
                  description: "The finished export job. `status` tells the two shapes apart: a
                    `completed` job carries a download link, a `failed` job
                    carries `null` link fields."
              required:
                - type
                - eventId
                - timestamp
                - data
              examples:
                - type: inventory.export.completed
                  eventId: 6842f4a87d1e9b3c5f2a6d04.completed
                  timestamp: 2026-06-02T10:12:46.000Z
                  data:
                    jobId: 6842f4a87d1e9b3c5f2a6d04
                    status: completed
                    downloadUrl: https://cardnexus-bulk-jobs.s3.eu-west-1.amazonaws.com/exports/6842f4a87d1e9b3c5f2a6d04/inventory.csv.gz?X-Amz-Expires=3600&X-Amz-Signature=b27c...
                    expiresAt: 2026-06-02T11:12:46.000Z
                - type: inventory.export.completed
                  eventId: 6842f5d13c8b2e6a9f1d4c77.completed
                  timestamp: 2026-06-02T10:31:02.000Z
                  data:
                    jobId: 6842f5d13c8b2e6a9f1d4c77
                    status: failed
                    downloadUrl: null
                    expiresAt: null
      responses:
        2XX:
          description: Acknowledged. Return any 2XX status to ack receipt; non-2XX
            triggers Svix's retry schedule.
tags:
  - name: Products
    description: "Browse the CardNexus catalogue: list games and their expansions,
      search or look up individual products, and resolve marketplace ids to
      CardNexus products. The [Feeds guide](https://docs.cardnexus.com/feeds)
      covers the same catalogue as downloadable files."
  - name: Pricing
    description: "Read market prices for catalogue products: current prices, price
      history, and recent sales. See the [Pricing
      guide](https://docs.cardnexus.com/pricing)."
  - name: Feeds
    description: "Download the catalogue and price data as bulk files: per-game
      catalog, expansions, prices, and a catalog changelog. See the [Feeds
      guide](https://docs.cardnexus.com/feeds)."
  - name: Lines
    description: Create, read, update, and delete individual inventory lines, and
      set their photos. See [Managing
      lines](https://docs.cardnexus.com/inventory/managing-lines).
  - name: Bulk operations
    description: Import and export inventory files, apply bulk updates, import from
      Cardmarket, TCGplayer, and TCG Power Tools, and track job progress. See
