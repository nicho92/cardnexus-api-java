  /products/{productId}/sales:
    get:
      operationId: pricing.getSales
      summary: Get a product's recent sales
      description: >-
        Returns the product's sales on the CardNexus marketplace completed in
        the last 30 days, as a cursor-paginated list. There are no date
        parameters — the 30-day window is fixed.


        Each sale carries the card's finish, condition (or grading), language,
        the quantity sold, the seller's market region (`eu` or `na`), and two
        prices: `price`, the per-card price the card was listed at in the
        listing's own currency, and `priceEur`, the same price converted to EUR
        at the exchange rate of the sale date. Sales carry no buyer or seller
        identifiers.


        The list is ordered by when the sale completed, newest first; `soldAt`
        is when the order was placed, so it can be slightly out of order within
        a page. Narrow the result with `finish`, `condition`, and `language`. A
        page can hold slightly more entries than `limit` when one order
        contained several matching cards.


        Walk the list by following `pagination.nextCursor`: pass it back as
        `cursor` until it comes back `null`. `limit` defaults to 50, maximum
        100.


        Requests count against the `product-sales` rate limit: 60 requests per
        hour.


        Authentication is required (any valid API key); no scope.
      tags:
        - Pricing
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            anyOf:
              - type: number
              - type: string
                pattern: ^[0-9]+$
