  /inventory/bulk/jobs/{jobId}:
    get:
      operationId: inventory.getBulkJob
      summary: Get a bulk job
      description: >-
        Returns the current state of one of your bulk import or export jobs —
        status, row counts, progress, and, once the job has completed, the
        download links.


        `downloadUrl` (exports) and `errorReportUrl` (imports with failed rows)
        are temporary links: each one stops working 15 minutes after this
        response. Fetch the job again for fresh links. The files themselves are
        kept until the job's `expiresAt`, 7 days after completion.


        Requires the `inventory:read` scope.
      tags:
        - Bulk operations
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            description: The job's identifier, returned by `POST /v1/inventory/bulk/import`
              or `POST /v1/inventory/bulk/export`. Path parameter.
      responses:
        "200":
          description: Bulk job returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  job:
                    type: object
                    properties:
                      id:
                        type: string
                        description: The job's identifier. Pass it to `GET
                          /v1/inventory/bulk/jobs/{jobId}` to poll for progress
                          and results.
                      kind:
                        enum:
                          - import
                          - export
                        type: string
                        description: Whether this job is an `import` or an `export`.
                        x-enum-descriptions:
                          import: An import job.
                          export: An export job.
                      status:
                        enum:
                          - pending
                          - processing
                          - completed
                          - failed
                        type: string
                        description: "Where the job stands: `pending` (queued, not started),
                          `processing` (running), `completed` (finished —
                          results are ready), or `failed` (stopped before
                          finishing; see `errorMessage`)."
                        x-enum-descriptions:
                          pending: Queued, not started yet.
                          processing: Running.
                          completed: Finished successfully.
                          failed: Finished with a failure — see `errorMessage`.
                      format:
                        enum:
                          - json
                          - csv
                        type: string
                        description: "The file format the job reads or writes: `json` or `csv`."
                        x-enum-descriptions:
                          json: A JSON file.
                          csv: A CSV file.
                      mode:
                        anyOf:
                          - enum:
                              - upsert
                              - replace
                            type: string
                            description: "`upsert` applies the file's rows on top of your current inventory.
                              `replace` additionally sets every line the file
                              does not mention to a quantity of zero."
                            x-enum-descriptions:
                              upsert: Apply the file's rows on top of your current inventory.
                              replace: Apply the file, then set every line the file doesn't mention to a
                                quantity of zero.
                          - type: "null"
                        description: "Import jobs: `upsert` or `replace`. `null` on export jobs."
                      counts:
                        anyOf:
                          - type: object
                            properties:
                              total:
                                type: integer
                                minimum: -9007199254740991
                                maximum: 9007199254740991
                                description: How many rows the job covers.
                              succeeded:
                                type: integer
                                minimum: -9007199254740991
                                maximum: 9007199254740991
                                description: How many rows were processed successfully so far.
                              failed:
                                type: integer
                                minimum: -9007199254740991
                                maximum: 9007199254740991
                                description: How many rows failed so far. Failed import rows are listed in the
                                  error report at `errorReportUrl`.
                            required:
                              - total
                              - succeeded
                              - failed
                            examples:
                              - total: 1842
                                succeeded: 1839
                                failed: 3
                          - type: "null"
                        description: Row tallies, updated while the job runs. `null` until processing
                          starts.
                      progress:
                        anyOf:
                          - type: integer
                            minimum: 0
                            maximum: 100
                          - type: "null"
                        description: How far along the job is, from 0 to 100.
                      errorMessage:
                        anyOf:
                          - type: string
                          - type: "null"
                        description: Why the job failed, when `status` is `failed`. `null` otherwise.
                          Individual row failures do not fail the job — they go
                          to the error report instead.
                      downloadUrl:
                        anyOf:
                          - type: string
                          - type: "null"
                        description: "Export jobs: a temporary link to the generated file once the job
                          completes. The link stops working 15 minutes after it
                          was issued — fetch the job again for a fresh one.
                          `null` until then, and always `null` on import jobs."
                      errorReportUrl:
                        anyOf:
                          - type: string
                          - type: "null"
                        description: "Import jobs: a temporary link to a JSON report listing every
                          failed row (`row` index, `code`, `message`) once the
                          job completes with failures. The link stops working 15
                          minutes after it was issued — fetch the job again for
                          a fresh one. `null` when every row succeeded."
                      expiresAt:
                        anyOf:
                          - $ref: "#/components/schemas/DateString"
                          - type: "null"
                        description: When the job's files (export file, error report) are deleted — 7
                          days after completion. `null` while the job is still
                          running.
                      createdAt:
                        type: string
                        format: date-time
                        description: When the job was created.
                        examples:
                          - 2024-08-14T10:23:11.000Z
                    required:
                      - id
                      - kind
                      - status
                      - format
                      - mode
                      - counts
                      - progress
                      - errorMessage
                      - downloadUrl
                      - errorReportUrl
                      - expiresAt
                      - createdAt
                    examples:
                      - id: 6848a1b2c8d4e9f7a6b5c4d3
                        kind: export
                        status: completed
                        format: csv
                        mode: null
                        counts:
                          total: 1842
