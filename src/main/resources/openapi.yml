  /lists:
    get:
      operationId: lists.list
      summary: Get your lists
      description: >-
        Returns your lists — decks, want lists, and for-sale lists — each with
        its name, status, and a summary of how many cards it holds and how
        complete it is.


        The cards themselves are not included here. Fetch a single list with
        `GET /v1/lists/{listId}` to get its cards.


        Filter by game, status, visibility, or name. Results are paginated with
        `offset` and `limit`.


        Requires the `lists:read` scope.
      tags:
        - Lists
      parameters:
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 9007199254740991
            default: 0
          allowEmptyValue: true
          allowReserved: true
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          allowEmptyValue: true
          allowReserved: true
        - name: game
          in: query
          schema:
            type: string
            minLength: 1
            description: Return only lists for this game, given as a slug, e.g. `pokemon`.
          allowEmptyValue: true
          allowReserved: true
        - name: status
          in: query
          schema:
            enum:
              - forSale
              - toComplete
              - hold
            type: string
            description: "Return only lists with this status: `forSale`, `toComplete`, or
              `hold`."
