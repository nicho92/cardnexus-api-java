    patch:
      operationId: inventory.update
      summary: Update an inventory line
      description: >-
        Changes a single inventory line — its quantity, condition, language,
        finish, grading, `customId`, `comment`, `notes`, `location`, or `tags`.
        Send only the fields you want to change.


        Quantity takes either `{"set": n}` (new total) or `{"adjust": n}`
        (signed change). A change that would leave zero or fewer cards is
        rejected with `INSUFFICIENT_QUANTITY` — use `DELETE
        /v1/inventory/{inventoryId}` to remove a line.


        `location` takes a location name, or `null` to move the line to no
        location. `tags` takes `{"set": [...]}` (replace the whole set, `[]`
        clears), `{"add": [...]}` (add, keep the rest), or `{"remove": [...]}`
        (remove only those). `location` and `tags` names must already exist — a
        name that matches none of your labels returns `LOCATION_NOT_FOUND` or
        `TAG_NOT_FOUND`. `notes` is your private note; pass `null` to remove it.


        `count` applies the attribute changes to only part of the line. When
        `count` is lower than the line's quantity, the line splits: `count`
        cards take the changes and come back as `line`, the rest stays unchanged
        and comes back as `remainder`. The split-off part inherits the original
        line's `comment` unless you send a new one, and never inherits its
        `customId` — send `customId` to give the new part its own. `count` needs
        at least one attribute change and cannot be combined with `quantity`.


        If the changes make this line identical to another of your lines (same
        product, finish, condition, language, grading, and listing state,
        neither line carrying a `customId`), the two merge; `line` is the
        surviving line.


        Send an `Idempotency-Key` header to make retries safe: the same key
        returns the same response for 24 hours.


        Requires the `inventory:write` scope.
      tags:
        - Lines
      parameters:
        - name: inventoryId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            description: The inventory line's identifier. Returned by `GET /v1/inventory`.
              Path parameter.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity:
                  anyOf:
                    - type: object
                      properties:
                        set:
                          type: integer
                          minimum: 1
                          maximum: 9007199254740991
                          description: The line's new total quantity.
                      required:
                        - set
                      additionalProperties: false
                    - type: object
                      properties:
                        adjust:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                          description: Cards to add (positive) or remove (negative).
                      required:
                        - adjust
                      additionalProperties: false
                  description: 'Quantity change: `{"set": n}` replaces the quantity, `{"adjust":
                    n}` adds or removes cards — one or the other, never both. A
                    change that would leave zero or fewer cards is rejected —
                    use `DELETE /v1/inventory/{inventoryId}` to remove a line.'
                condition:
                  $ref: "#/components/schemas/CardCondition"
                  description: "New condition: `NM`, `LP`, `MP`, `HP`, or `DMG`."
                language:
                  type: string
                  minLength: 1
                  description: New language, as a two-letter code, e.g. `en`.
                finish:
                  enum:
                    - Standard
                    - Foil
                    - Rainbow
                    - Gold
                    - Rainbow Foil
                    - Cold Foil
                    - Gold Foil
                    - Etched
                    - Signed
                    - Reverse Holo
                    - Blast Foil Rainbow
                    - Bubbles Foil
                    - Cracked Ice Foil
                    - Galaxy Foil
                    - Glitter Foil
                    - Multi Sideline Foil
                    - Rainbow Solid Texture Stamp
                    - Star Foil
                    - Surge Foil
                    - Full Art Gold Sign
                    - Depth Lenticular
                    - Flip Lenticular
                    - Lenticular
                    - Zarimoth
                    - Serialized
                    - Serialized Rose Gold
                    - Serialized Gold
                    - Holographic
                    - Embossed
                    - Holofoil
                  type: string
                  description: New finish, e.g. `Standard`, `Foil`, `Reverse Holo`.
                  x-enum-descriptions:
                    Standard: A standard, non-foil card.
                    Foil: A foil card.
                    Reverse Holo: A card with a reverse-holofoil finish.
                    Etched: A card with an etched-foil finish.
                graded:
                  anyOf:
                    - type: object
                      properties:
                        grade:
                          type: string
                          minLength: 1
                          description: The grade printed on the slab, e.g. `9.5`.
                        certification:
                          type: string
                          minLength: 1
                          description: The certification number printed on the slab. Omit it when you do
                            not have it.
                        gradingService:
                          enum:
                            - PSA
                            - Beckett
                            - CGC
                            - TAG
                            - PCG
                            - CCC
                            - PCA
                            - CollectAura
                            - MTGGrade
                            - PureGrading
                            - SGS
                          type: string
                          description: The grading company that graded the card, e.g. `PSA`, `Beckett`,
                            `CGC`.
                          x-enum-descriptions:
                            PSA: Professional Sports Authenticator.
                            Beckett: Beckett Grading Services.
                            CGC: Certified Guaranty Company.
                      required:
                        - grade
                        - gradingService
                      examples:
                        - grade: "9.5"
                          certification: "0084712663"
                          gradingService: PSA
                        - grade: "10"
                          gradingService: CGC
                    - type: "null"
                  description: New grading details, or `null` to turn the line back into a raw
                    card (set `condition` in the same call).
                customId:
                  anyOf:
                    - $ref: "#/components/schemas/CustomId"
                    - type: "null"
                  description: Your own stable identifier for this line, unique across your live
                    lines. Pass `null` to remove it.
                comment:
                  anyOf:
                    - $ref: "#/components/schemas/InventoryComment"
                    - type: "null"
                  description: Free-text note for the line, shown to buyers on your Marketplace
                    listing. Pass `null` to remove it.
                notes:
                  anyOf:
                    - type: string
                      maxLength: 2000
                      description: Private free-text note attached to this inventory line, visible
                        only to you. Never shown to buyers.
                      examples:
                        - Bought at the March show, restock from supplier A
                    - type: "null"
                  description: Private note for the line, visible only to you. Pass `null` to
                    remove it.
                location:
                  anyOf:
                    - type: string
                      minLength: 1
                      maxLength: 100
                      description: The label's name. Matched case-insensitively, with surrounding
                        spaces ignored — `Shelf A` and `shelf a` are the same
                        label.
                      examples:
                        - Trade binder
                    - type: "null"
                  description: The location for this line, by name. Must match one of your
                    existing locations. Pass `null` to move the line to no
                    location.
                tags:
                  anyOf:
                    - type: object
                      properties:
                        set:
                          type: array
                          maxItems: 50
                          items:
                            type: string
                            minLength: 1
                            maxLength: 100
                            description: The label's name. Matched case-insensitively, with surrounding
                              spaces ignored — `Shelf A` and `shelf a` are the
                              same label.
                            examples:
                              - Trade binder
                          description: Replace the line's tags with exactly these. Send `[]` to remove all
                            tags.
                      required:
                        - set
                      additionalProperties: false
                    - type: object
                      properties:
                        add:
                          type: array
                          minItems: 1
                          maxItems: 50
                          items:
                            type: string
                            minLength: 1
                            maxLength: 100
                            description: The label's name. Matched case-insensitively, with surrounding
                              spaces ignored — `Shelf A` and `shelf a` are the
                              same label.
                            examples:
                              - Trade binder
                          description: Add these tags to the line, keeping the ones it already has.
                      required:
                        - add
                      additionalProperties: false
                    - type: object
                      properties:
                        remove:
                          type: array
                          minItems: 1
                          maxItems: 50
                          items:
                            type: string
                            minLength: 1
                            maxLength: 100
                            description: The label's name. Matched case-insensitively, with surrounding
                              spaces ignored — `Shelf A` and `shelf a` are the
                              same label.
                            examples:
                              - Trade binder
                          description: Remove these tags from the line, leaving the ones you don't list.
                      required:
                        - remove
                      additionalProperties: false
                  description: "How to change the line's tags: `{\"set\": [...]}` replaces the
                    whole set (`{\"set\": []}` clears them), `{\"add\": [...]}`
                    adds without removing others, `{\"remove\": [...]}` removes
                    only the ones you name. Choose exactly one. Every name must
                    match one of your existing tags."
                count:
                  type: integer
                  minimum: 1
                  maximum: 9007199254740991
                  description: "Apply the attribute changes to only this many cards. When `count`
                    is lower than the line's quantity, the line splits: `count`
                    cards take the changes and come back as `line`, the rest
                    stays unchanged and comes back as `remainder`. Cannot be
                    combined with `quantity`."
              required: []
