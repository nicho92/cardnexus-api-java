  /products/resolve:
    post:
      operationId: products.resolveProducts
      summary: Resolve products by marketplace id
      description: >-
        Maps Cardmarket or TCGplayer product ids to CardNexus products, up to
        200 ids per call.


        Each id resolves to at most one product, including the finish the id
        maps to — a marketplace product id is finish-specific, so a card's Foil
        and Standard printings carry different ids. Ids with no match come back
        with `product: null`, so a single call gives you a complete mapping
        table, misses included.


        Pair this with the bulk import: resolve your Cardmarket `idProduct` (or
        TCGplayer product id) column to CardNexus product ids, then send those
        as the `productId` on each `POST /v1/inventory/bulk/import` row.


        Authentication is required (any valid API key); no scope.
      tags:
        - Products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                marketplace:
                  enum:
                    - cardmarket
                    - tcgplayer
                  type: string
                  description: Which marketplace your ids come from. `cardmarket` matches a
                    Cardmarket product id (the `idProduct` in a Cardmarket stock
                    file); `tcgplayer` matches a TCGplayer product id.
                  x-enum-descriptions:
                    cardmarket: Cardmarket.
                    tcgplayer: TCGplayer.
                ids:
                  type: array
                  minItems: 1
                  maxItems: 200
                  items:
                    type: integer
                    minimum: 0
                    maximum: 9007199254740991
                  description: The marketplace product ids to look up. 1–200 per call.
              required:
                - marketplace
                - ids
      responses:
        "200":
          description: Resolution results returned, one per requested id.
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        externalId:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                          description: The marketplace id you asked about.
                        product:
