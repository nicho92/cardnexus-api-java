                        errorReportUrl: null
                        expiresAt: 2026-06-17T09:15:31.000Z
                        createdAt: 2026-06-10T09:14:02.000Z
                      - id: 6848a3f0c8d4e9f7a6b5c4e1
                        kind: import
                        status: processing
                        format: json
                        mode: upsert
                        counts:
                          total: 12000
