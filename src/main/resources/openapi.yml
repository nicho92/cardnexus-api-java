  /listings:
    get:
      operationId: listings.list
      summary: Get your listings
      description: >-
        Returns the inventory lines you have published to the Marketplace, as a
        cursor-paginated list ordered by line id.


        This is `GET /v1/inventory` restricted to lines that are for sale —
        every line in the response has `forSale` set to `true` and carries a
        `listing` price. Lines in your Collection are not included.


        Filter with any combination of `game`, `productId` (repeatable),
        `condition`, `language`, `finish`, `graded`, `customId`,
        `customIdPrefix`, `customIdContains`, and `commentContains`. Filters are
        combined with AND.


        Walk the full set by following `pagination.nextCursor` until it comes
        back `null`. `limit` defaults to 50, maximum 100.


        Requires the `listings:read` scope.
      tags:
        - Listings
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
          allowEmptyValue: true
          allowReserved: true
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          allowEmptyValue: true
          allowReserved: true
        - name: game
          in: query
          schema:
            type: string
            minLength: 1
            description: Return only lines for this game, given as a slug, e.g. `yugioh`.
          allowEmptyValue: true
          allowReserved: true
        - name: productId
          in: query
          schema:
            type: array
            items:
              anyOf:
                - type: number
                - type: string
                  pattern: ^[0-9]+$
              examples:
                - 50212
            description: Return only lines for these products. Repeat the parameter to pass
              several. Product ids come from `GET /v1/products`.
          style: deepObject
          explode: true
          allowEmptyValue: true
          allowReserved: true
        - name: condition
          in: query
          schema:
            $ref: "#/components/schemas/CardCondition"
            description: "Return only lines in this condition: `NM`, `LP`, `MP`, `HP`, or
              `DMG`."
          style: deepObject
          explode: true
          allowEmptyValue: true
          allowReserved: true
        - name: language
          in: query
          schema:
            type: string
            minLength: 1
            description: Return only lines in this language, as a two-letter code, e.g.
              `en`.
          allowEmptyValue: true
          allowReserved: true
        - name: finish
          in: query
          schema:
            enum:
              - Standard
              - Foil
              - Rainbow
              - Gold
              - Rainbow Foil
              - Cold Foil
              - Gold Foil
              - Etched
              - Signed
              - Reverse Holo
              - Blast Foil Rainbow
              - Bubbles Foil
              - Cracked Ice Foil
              - Galaxy Foil
              - Glitter Foil
              - Multi Sideline Foil
              - Rainbow Solid Texture Stamp
              - Star Foil
              - Surge Foil
              - Full Art Gold Sign
              - Depth Lenticular
              - Flip Lenticular
              - Lenticular
              - Zarimoth
              - Serialized
              - Serialized Rose Gold
              - Serialized Gold
              - Holographic
              - Embossed
              - Holofoil
            type: string
            description: Return only lines with this finish, e.g. `Standard`, `Foil`,
              `Reverse Holo`.
            x-enum-descriptions:
              Standard: A standard, non-foil card.
              Foil: A foil card.
              Reverse Holo: A card with a reverse-holofoil finish.
              Etched: A card with an etched-foil finish.
          allowEmptyValue: true
          allowReserved: true
        - name: graded
          in: query
          schema:
            type: boolean
            description: "`true` returns only graded cards; `false` returns only raw cards.
              Omit to return both."
          allowEmptyValue: true
          allowReserved: true
        - name: customId
          in: query
          schema:
            type: string
            minLength: 1
            description: Return the line whose `customId` exactly equals this value.
          allowEmptyValue: true
          allowReserved: true
        - name: customIdPrefix
          in: query
          schema:
            type: string
            minLength: 1
            description: Return lines whose `customId` starts with this value.
          allowEmptyValue: true
          allowReserved: true
        - name: customIdContains
          in: query
          schema:
            type: string
            minLength: 1
            description: Return lines whose `customId` contains this value,
              case-insensitively.
          allowEmptyValue: true
          allowReserved: true
        - name: commentContains
          in: query
          schema:
            type: string
            minLength: 1
            description: Return lines whose `comment` contains this value,
              case-insensitively.
          allowEmptyValue: true
          allowReserved: true
      responses:
        "200":
          description: Listings returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Stable opaque identifier for this inventory line. Do not parse.
                        customId:
                          anyOf:
                            - $ref: "#/components/schemas/CustomId"
                            - type: "null"
                          description: Your own stable identifier for this line, unique across your live
                            lines. `null` when you have not set one.
                        comment:
                          anyOf:
                            - type: string
                            - type: "null"
                          description: Free-text note attached to this line, shown to buyers on your
                            Marketplace listing. `null` when there is none.
                        notes:
                          anyOf:
                            - type: string
                            - type: "null"
                          description: Your private note on this line, visible only to you and never shown
                            to buyers. `null` when there is none.
                        location:
                          anyOf:
                            - type: string
                            - type: "null"
                          description: The name of the location this line sits in. `null` when it has
                            none.
                        tags:
                          type: array
                          items:
                            type: string
                          description: The names of the tags attached to this line. Empty when the line
                            has no tags.
                        productId:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                          description: The catalogue product this line stocks. Returned by `GET
                            /v1/products`.
                          examples:
                            - 50212
                        game:
                          type: string
                          description: The game the product belongs to, as a slug, e.g. `yugioh`.
                        finish:
                          type: string
                          description: The card's finish, e.g. `Standard`, `Foil`, `Reverse Holo`.
                        condition:
                          anyOf:
                            - $ref: "#/components/schemas/CardCondition"
                            - type: "null"
                          description: "The card's condition: `NM`, `LP`, `MP`, `HP`, or `DMG`. `null`
                            when the card is graded."
                        language:
                          anyOf:
                            - type: string
                            - type: "null"
                          description: The card's language as a two-letter code, e.g. `en`, `fr`, `de`.
                        quantity:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                          description: How many cards this line holds.
                        graded:
                          anyOf:
                            - $ref: "#/components/schemas/Graded"
                            - type: "null"
                          description: Grading details when the card is graded. `null` for raw cards.
                        forSale:
                          type: boolean
                          description: "`true` when this line is published to the Marketplace with a
                            price. `false` when it sits in your Collection."
                        listing:
                          anyOf:
                            - type: object
                              properties:
                                price:
                                  $ref: "#/components/schemas/Money"
                              required:
                                - price
                              examples:
                                - price:
                                    amount: 42.5
                                    currency: EUR
                            - type: "null"
                          description: The listing details when `forSale` is `true`. `null` when the line
                            is not for sale.
                        updatedAt:
                          type: string
                          format: date-time
                          description: When this line was last modified.
                          examples:
                            - 2024-08-14T10:23:11.000Z
                      required:
                        - id
                        - customId
                        - comment
                        - notes
                        - location
                        - tags
                        - productId
                        - game
                        - finish
                        - condition
                        - language
                        - quantity
                        - graded
                        - forSale
                        - listing
                        - updatedAt
                      examples:
                        - id: 665f3a2b1c8d4e9f7a6b5c4d
                          customId: YRG|5555-5DS1-2EX-006-f-2-2008-08-01
                          comment: Slight edge wear on the back corner
                          notes: Bought at the March show
                          location: Shelf A
                          tags:
                            - Trade binder
                            - Graded pile
                          productId: 50212
                          game: yugioh
                          finish: Standard
                          condition: NM
                          language: en
                          quantity: 5
                          graded: null
                          forSale: true
                          listing:
                            price:
                              amount: 42.5
                              currency: EUR
                          updatedAt: 2026-06-01T17:40:02.000Z
                  pagination:
                    type: object
                    properties:
                      nextCursor:
                        anyOf:
                          - type: string
                          - type: "null"
                    required:
                      - nextCursor
                required:
                  - data
                  - pagination
                examples:
                  - data:
                      - id: 665f3a2b1c8d4e9f7a6b5c4d
                        customId: YRG|5555-5DS1-2EX-006-f-2-2008-08-01
                        comment: Pack fresh, straight into a toploader
