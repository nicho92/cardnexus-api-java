openapi: 3.1.1
paths:
  /account/me:
    get:
      operationId: account.me
      summary: Get your account
      description: >-
        Returns your account: identity (username, email, avatar, signup date),
        your seller profile if you've onboarded as a seller, and the list of
        scopes your API key holds.


        Requires the `account:read` scope.
      tags:
        - Account
      parameters: []
      responses:
        "200":
          description: Account returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  username:
                    type: string
                    description: Your public handle. Empty string if you haven't picked one yet.
                  email:
                    type: string
                    format: email
                    description: Your primary email address.
                  imageUrl:
                    type: string
                    description: Your avatar URL. Empty string if you haven't uploaded one.
                  createdAt:
                    type: string
                    format: date-time
                    description: When you signed up (ISO 8601, UTC).
                    examples:
                      - 2024-08-14T10:23:11.000Z
                  seller:
                    anyOf:
                      - type: object
                        properties:
                          type:
                            enum:
                              - pro
                              - individual
                            type: string
                            description: What kind of seller you are. `pro` if you sell as a registered
                              company; `individual` if you sell as a private
                              person.
                            x-enum-descriptions:
                              pro: You sell as a registered company.
                              individual: You sell as a private person.
                          country:
                            type: string
                            minLength: 2
                            maxLength: 2
                            description: Your country, as a two-letter ISO 3166-1 alpha-2 code (e.g. `FR`,
                              `US`, `GB`).
                          currency:
                            enum:
                              - USD
                              - EUR
                              - GBP
                              - CAD
                              - CHF
                              - SEK
                              - DKK
