info:
  title: CardNexus Public API
  version: 1.2.0
  description: >-
    The CardNexus Public API provides programmatic access to the CardNexus
    marketplace and catalogue — games, expansions, and products across Magic:
    The Gathering, Pokémon, One Piece, and the other games CardNexus supports,
    plus your own inventory, listings, and orders.


    ## Base URL and versioning


    All endpoints sit under `/v1`. The production base URL is
    `https://public-api.cardnexus.com/v1`.


    ## Authentication


    Every request carries a single bearer token (an API key) in the
    `Authorization` header. See
    [Authentication](https://docs.cardnexus.com/guides/authentication) and [API
    keys](https://docs.cardnexus.com/guides/api-keys).


    ## Guides


    Start with the [Quickstart](https://docs.cardnexus.com/quickstart). The full
    [documentation hub](https://docs.cardnexus.com) has guides and recipes for
    every part of the API.
servers:
  - url: https://public-api.cardnexus.com/v1
    description: Production
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: "CardNexus API key. Mint one from cardnexus.com → Settings → API
        Keys. Format: `cnk_live_` followed by a random string."
  schemas:
    GameSummary:
      type: object
      properties:
        id:
          type: string
          description: "The game's identifier. Stable string — pass it back to address
            this game elsewhere. Example values: `mtg`, `pokemon`, `yugioh`,
            `lorcana`, `onepiece`."
        name:
          type: string
          description: The game's display name.
        releaseDate:
          $ref: "#/components/schemas/DateString"
          description: When the game was released (ISO 8601, UTC).
        cardCount:
          type: integer
          minimum: 0
          maximum: 9007199254740991
          description: Total number of unique cards across every expansion of this game.
        sealedProductCount:
          type: integer
          minimum: 0
          maximum: 9007199254740991
          description: Total number of sealed products (booster boxes, bundles, …) across
            every expansion of this game.
        logoUrl:
          type: string
          format: uri
          description: URL of the game's logo image.
      required:
        - id
        - name
      examples:
        - id: mtg
          name: "Magic: The Gathering"
          releaseDate: 1993-08-05T00:00:00.000Z
          cardCount: 28412
          sealedProductCount: 1834
          logoUrl: https://images.cardnexus.com/games/mtg/logo.svg
    ExpansionSummary:
      type: object
      properties:
        id:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
          description: The expansion's identifier. Stable number — pass it back to address
            this expansion elsewhere.
          examples:
            - 50212
        gameId:
          type: string
          description: The game this expansion belongs to (e.g. `mtg`, `pokemon`).
        slug:
          type: string
          description: URL-friendly identifier, unique within its game. Useful as a stable
            lookup key alongside `id` (e.g. `bloomburrow`).
        name:
          type: string
          description: The expansion's display name.
        code:
          type: string
          description: Short expansion code (e.g. `BLB` for Bloomburrow, `SV4` for Stellar
            Crown). Unique within a game.
        releaseDate:
          $ref: "#/components/schemas/DateString"
          description: When the expansion was released (ISO 8601, UTC).
        cardCount:
          type: integer
          minimum: 0
          maximum: 9007199254740991
          description: Number of unique cards in this expansion.
        sealedProductCount:
          type: integer
          minimum: 0
          maximum: 9007199254740991
          description: Number of sealed products (booster boxes, bundles, …) for this
            expansion.
        languages:
          type: array
          items:
            type: string
          description: Languages the expansion was printed in, as ISO 639 codes (e.g.
            `en`, `fr`, `ja`, `zh-Hans`).
        logoUrl:
          type: string
          format: uri
          description: URL of the expansion's logo image.
        symbolUrl:
          type: string
          format: uri
          description: URL of the expansion's set symbol image.
      required:
        - id
        - gameId
        - slug
        - name
        - code
        - languages
      examples:
        - id: 42
          gameId: mtg
          slug: bloomburrow
          name: Bloomburrow
          code: BLB
          releaseDate: 2024-08-02T00:00:00.000Z
          cardCount: 261
          sealedProductCount: 7
          languages:
            - en
            - fr
            - de
            - it
            - es
            - ja
            - ko
            - zh-Hans
          logoUrl: https://images.cardnexus.com/expansions/mtg/blb/logo.svg
          symbolUrl: https://images.cardnexus.com/expansions/mtg/blb/symbol.svg
    CardProduct:
      type: object
      properties:
        id:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
          description: The product's identifier. Stable number — pass it back to address
            this product elsewhere.
          examples:
            - 50212
        gameId:
          type: string
          description: The game this product belongs to (e.g. `mtg`, `pokemon`).
        expansionId:
          $ref: "#/components/schemas/CatalogId"
          description: The expansion this product belongs to. Absent for products that
            aren't tied to a single set.
        game:
          $ref: "#/components/schemas/EmbeddedGame"
        expansion:
          $ref: "#/components/schemas/EmbeddedExpansion"
          description: Compact expansion reference. Absent for products not tied to a
            single set.
        name:
          type: string
          description: The product's display name.
        nameSlug:
          type: string
          description: URL-friendly slug derived from the product name, unique within its
            game. Useful as a stable lookup key.
        languages:
          type: array
          items:
            type: string
          description: Languages this product was printed in, as ISO 639 codes (e.g. `en`,
            `fr`, `ja`).
        imageUrl:
          type: string
          format: uri
          description: URL of the product's primary image (front face for cards).
        externalIds:
          $ref: "#/components/schemas/ExternalIds"
          description: This product's ids on Cardmarket and TCGplayer, one per finish.
            Absent when the product carries no marketplace mapping. Use them to
            bridge with your existing Cardmarket / TCGplayer integration.
        productType:
          const: card
        printNumber:
          type: string
          description: The card's print number within its expansion (e.g. `001/271`,
            `38/91`). String, not numeric — formats vary by game.
        variant:
          type: string
          description: Variant identifier when a card has multiple printings within the
            same expansion (e.g. `borderless`, `extended-art`, `showcase`,
            `promo`).
        rarity:
          anyOf:
            - type: string
            - type: "null"
          description: The card's rarity. Values are game-specific (e.g. `common`,
            `uncommon`, `rare`, `mythic` for MTG; `common`, `uncommon`, `rare`,
            `holo-rare`, `secret-rare` for Pokémon).
        imageBackUrl:
          type: string
          format: uri
          description: URL of the card's back image. Present for double-faced cards (MTG)
            and similar.
        finishes:
          type: array
          items:
            enum:
              - Standard
              - Foil
              - Rainbow
              - Gold
              - Rainbow Foil
              - Cold Foil
              - Gold Foil
              - Etched
              - Signed
              - Reverse Holo
              - Blast Foil Rainbow
              - Bubbles Foil
              - Cracked Ice Foil
              - Galaxy Foil
              - Glitter Foil
              - Multi Sideline Foil
              - Rainbow Solid Texture Stamp
              - Star Foil
              - Surge Foil
              - Full Art Gold Sign
              - Depth Lenticular
              - Flip Lenticular
              - Lenticular
              - Zarimoth
              - Serialized
              - Serialized Rose Gold
              - Serialized Gold
              - Holographic
              - Embossed
              - Holofoil
            type: string
            x-enum-descriptions:
              Standard: A standard, non-foil card.
              Foil: A foil card.
              Reverse Holo: A card with a reverse-holofoil finish.
              Etched: A card with an etched-foil finish.
          description: The finishes this card was printed in (e.g. `Standard`, `Foil`,
            `Reverse Holo`).
        pricesByFinish:
          type: object
          propertyNames:
            enum:
              - Standard
              - Foil
              - Rainbow
              - Gold
              - Rainbow Foil
              - Cold Foil
              - Gold Foil
              - Etched
              - Signed
              - Reverse Holo
              - Blast Foil Rainbow
              - Bubbles Foil
              - Cracked Ice Foil
              - Galaxy Foil
              - Glitter Foil
              - Multi Sideline Foil
              - Rainbow Solid Texture Stamp
              - Star Foil
              - Surge Foil
              - Full Art Gold Sign
              - Depth Lenticular
              - Flip Lenticular
              - Lenticular
              - Zarimoth
              - Serialized
              - Serialized Rose Gold
              - Serialized Gold
              - Holographic
              - Embossed
              - Holofoil
            type: string
            x-enum-descriptions:
              Standard: A standard, non-foil card.
              Foil: A foil card.
              Reverse Holo: A card with a reverse-holofoil finish.
              Etched: A card with an etched-foil finish.
          additionalProperties:
            $ref: "#/components/schemas/MarketPrice"
          description: Current market price snapshot keyed by finish. Only finishes with
            pricing data are present — missing keys mean we don't have a price
            for that finish yet. An empty object means the card has no pricing
            data at all.
        attributes:
          type: object
          propertyNames:
            type: string
          additionalProperties: {}
          description: Game-specific attributes (e.g. MTG mana cost and colors, Pokémon HP
            and types). Schema varies by game; the values reflect what's stored
            on the catalogue entry.
      required:
        - id
        - gameId
        - game
        - name
        - nameSlug
        - languages
        - productType
        - finishes
        - pricesByFinish
        - attributes
      examples:
        - id: 50212
          gameId: mtg
          expansionId: 42
          game:
            id: mtg
            name: "Magic: The Gathering"
          expansion:
            id: 42
            name: Limited Edition Alpha
            code: LEA
            symbolUrl: https://images.cardnexus.com/expansions/mtg/lea/symbol.svg
          name: Black Lotus
          nameSlug: black-lotus
          languages:
            - en
          imageUrl: https://images.cardnexus.com/products/mtg/lea/black-lotus-front.jpg
          productType: card
          printNumber: "232"
          rarity: rare
          finishes:
            - Standard
          pricesByFinish:
            Standard:
              eur:
                low: 14999
                mid: 17500
                high: 32500
                marketValue: 18250
                change24h: 0.4
                change7d: -1.2
                change30d: 5.7
              usd:
                low: 16450
                mid: 19250
                high: 35200
                marketValue: 20100
                change24h: 0.3
                change7d: -0.9
                change30d: 6.1
          attributes:
            manaCost: "{0}"
            colors: []
            typeLine: Artifact
    SealedProduct:
      type: object
      properties:
        id:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
          description: The product's identifier. Stable number — pass it back to address
