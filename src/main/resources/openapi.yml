              toComplete: Cards you're working to complete, such as a want list or a deck in
                progress.
              hold: Cards you're keeping aside.
          allowEmptyValue: true
          allowReserved: true
        - name: isPublic
          in: query
          schema:
            type: boolean
            description: "`true` returns only public lists; `false` returns only private
              ones. Omit to return both."
          allowEmptyValue: true
          allowReserved: true
        - name: name
          in: query
          schema:
            type: string
            minLength: 1
            description: Return only lists whose name contains this value,
              case-insensitively.
          allowEmptyValue: true
          allowReserved: true
