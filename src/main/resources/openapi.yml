  /inventory:
    get:
      operationId: inventory.list
      summary: Get your inventory lines
      description: >-
        Returns your inventory lines, newest writes included, as a
        cursor-paginated list ordered by line id.


        Each line carries its product, finish, condition (or grading), language,
        quantity, and — when it is for sale — its listing price. `forSale` is
        `true` for lines published to the Marketplace and `false` for lines kept
        in your Collection.


        Filter with any combination of `game`, `productId` (repeatable),
        `forSale`, `condition`, `language`, `finish`, `graded`, `customId`,
        `customIdPrefix`, `customIdContains`, and `commentContains`. Filters are
        combined with AND.


        Walk the full set by following `pagination.nextCursor`: pass it back as
        `cursor` until it comes back `null`. The id order is stable, so a sweep
        stays consistent while you write to your inventory. `limit` defaults to
        50, maximum 100.


        Requires the `inventory:read` scope.
      tags:
        - Lines
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
          allowEmptyValue: true
          allowReserved: true
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          allowEmptyValue: true
          allowReserved: true
        - name: game
          in: query
          schema:
            type: string
            minLength: 1
            description: Return only lines for this game, given as a slug, e.g. `yugioh`.
          allowEmptyValue: true
          allowReserved: true
        - name: productId
          in: query
          schema:
            type: array
            items:
              anyOf:
                - type: number
                - type: string
                  pattern: ^[0-9]+$
              examples:
                - 50212
            description: Return only lines for these products. Repeat the parameter to pass
              several. Product ids come from `GET /v1/products`.
          style: deepObject
          explode: true
          allowEmptyValue: true
          allowReserved: true
        - name: condition
          in: query
          schema:
            $ref: "#/components/schemas/CardCondition"
            description: "Return only lines in this condition: `NM`, `LP`, `MP`, `HP`, or
              `DMG`."
          style: deepObject
          explode: true
          allowEmptyValue: true
          allowReserved: true
        - name: language
          in: query
          schema:
            type: string
            minLength: 1
            description: Return only lines in this language, as a two-letter code, e.g.
              `en`.
          allowEmptyValue: true
          allowReserved: true
        - name: finish
          in: query
          schema:
            enum:
              - Standard
              - Foil
              - Rainbow
              - Gold
              - Rainbow Foil
              - Cold Foil
              - Gold Foil
              - Etched
              - Signed
              - Reverse Holo
              - Blast Foil Rainbow
              - Bubbles Foil
              - Cracked Ice Foil
              - Galaxy Foil
              - Glitter Foil
              - Multi Sideline Foil
              - Rainbow Solid Texture Stamp
              - Star Foil
              - Surge Foil
              - Full Art Gold Sign
              - Depth Lenticular
              - Flip Lenticular
              - Lenticular
              - Zarimoth
              - Serialized
              - Serialized Rose Gold
              - Serialized Gold
              - Holographic
              - Embossed
              - Holofoil
            type: string
            description: Return only lines with this finish, e.g. `Standard`, `Foil`,
              `Reverse Holo`.
            x-enum-descriptions:
              Standard: A standard, non-foil card.
              Foil: A foil card.
              Reverse Holo: A card with a reverse-holofoil finish.
              Etched: A card with an etched-foil finish.
          allowEmptyValue: true
          allowReserved: true
        - name: graded
          in: query
          schema:
            type: boolean
            description: "`true` returns only graded cards; `false` returns only raw cards.
              Omit to return both."
          allowEmptyValue: true
          allowReserved: true
        - name: customId
