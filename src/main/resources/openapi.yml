  /sales:
    get:
      operationId: sales.list
      summary: List your sales
      description: >-
        Returns your sales — orders where you are the seller — as a
        cursor-paginated list, newest first.


        Each item carries the order, its items and totals, and the **buyer** you
        sold to: their handle, country, review score, and recent order-handling
        stats.


        Filter with `status` (repeatable) and the `placedFrom` / `placedTo` date
        range. Walk the full set by following `pagination.nextCursor`: pass it
        back as `cursor` until it comes back `null`. `limit` defaults to 50,
        maximum 100.


        Requires the `sales:read` scope.
      tags:
        - Sales
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
          allowEmptyValue: true
          allowReserved: true
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          allowEmptyValue: true
          allowReserved: true
        - name: status
          in: query
          schema:
            type: array
            items:
              $ref: "#/components/schemas/OrderStatus"
            description: Filter to orders in any of these statuses. Repeat the parameter for
              multiple values, e.g. `?status=shipped&status=delivered`.
          style: deepObject
          explode: true
          allowEmptyValue: true
          allowReserved: true
        - name: placedFrom
          in: query
          schema:
            $ref: "#/components/schemas/DateString"
            description: Only orders placed at or after this ISO 8601 timestamp.
          style: deepObject
          explode: true
          allowEmptyValue: true
          allowReserved: true
        - name: placedTo
          in: query
          schema:
            $ref: "#/components/schemas/DateString"
            description: Only orders placed at or before this ISO 8601 timestamp.
          style: deepObject
          explode: true
          allowEmptyValue: true
          allowReserved: true
