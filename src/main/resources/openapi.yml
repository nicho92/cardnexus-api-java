webhooks:
  order.created:
    post:
      summary: Order created
      description: 'Fires when a new order is placed. Delivered to both the seller and
        the buyer, with the payload shaped per role (`recipientRole: "buyer" |
        "seller"`).'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  const: order.created
                eventId:
                  type: string
                  description: Idempotency key. Stable across retries of the same delivery; safe
                    to dedupe on.
                timestamp:
                  type: string
                  format: date-time
                  description: When this webhook was emitted (ISO 8601, UTC).
                  examples:
                    - 2024-08-14T10:23:11.000Z
                recipientRole:
                  enum:
                    - seller
                    - buyer
                  type: string
                  description: Whether this delivery is for the seller or the buyer side of the
                    order. The same order produces two deliveries — one to each
                    role.
                  x-enum-descriptions:
                    seller: You received this because you're the seller.
                    buyer: You received this because you're the buyer.
                data:
                  type: object
                  properties:
                    orderNumber:
                      type: string
                      description: Stable order identifier (e.g. `OR-ASNBC-1`).
                    status:
                      enum:
                        - pending_payment
                        - pending_shipment
                        - shipped
                        - delivered
                        - completed
                        - cancelled
                      type: string
                      description: Current status of the order at the time of the event.
                      x-enum-descriptions:
                        pending_payment: Awaiting payment.
                        pending_shipment: Paid, awaiting dispatch.
                        shipped: On its way to the buyer.
                        delivered: Delivered to the buyer.
                        completed: Closed and paid out.
                        cancelled: The order was cancelled.
                    currency:
                      enum:
                        - USD
                        - EUR
                        - GBP
                        - CAD
                        - CHF
                        - SEK
                        - DKK
                        - NOK
                        - PLN
                        - HUF
                      type: string
                      x-enum-descriptions:
                        USD: US Dollar.
                        EUR: Euro.
                        GBP: British Pound.
                        CAD: Canadian Dollar.
                        CHF: Swiss Franc.
                        SEK: Swedish Krona.
                        DKK: Danish Krone.
                        NOK: Norwegian Krone.
                        PLN: Polish Złoty.
                        HUF: Hungarian Forint.
                    totalAmount:
                      type: object
                      properties:
                        amount:
                          type: number
                          description: Decimal amount in the currency's major unit (e.g. `5.23` for
                            €5.23). 2 decimal places for
                            EUR/USD/GBP/CHF/CAD/AUD.
                        currency:
                          enum:
                            - USD
                            - EUR
                            - GBP
                            - CAD
                            - CHF
                            - SEK
                            - DKK
                            - NOK
                            - PLN
                            - HUF
                          type: string
                          x-enum-descriptions:
                            USD: US Dollar.
                            EUR: Euro.
                            GBP: British Pound.
                            CAD: Canadian Dollar.
                            CHF: Swiss Franc.
                            SEK: Swedish Krona.
                            DKK: Danish Krone.
                            NOK: Norwegian Krone.
                            PLN: Polish Złoty.
                            HUF: Hungarian Forint.
                      required:
                        - amount
                        - currency
                      description: Order total including any shipping and fees.
                      examples:
                        - amount: 14.99
                          currency: USD
                    itemCount:
                      type: integer
                      minimum: 1
                      maximum: 9007199254740991
                      description: Total number of items across all line items.
                    items:
                      type: array
                      items:
                        type: object
                        properties:
                          productId:
                            type: integer
                            minimum: -9007199254740991
                            maximum: 9007199254740991
                            description: The catalogue product that was purchased. Returned by `GET
                              /v1/products`.
                            examples:
                              - 50212
                          name:
                            type: string
                            description: Product name at time of purchase.
                          quantity:
                            type: integer
                            minimum: 1
                            maximum: 9007199254740991
                            description: How many of this product.
                          unitPrice:
                            type: object
                            properties:
                              amount:
                                type: number
                                description: Decimal amount in the currency's major unit (e.g. `5.23` for
                                  €5.23). 2 decimal places for
                                  EUR/USD/GBP/CHF/CAD/AUD.
                              currency:
                                enum:
                                  - USD
                                  - EUR
                                  - GBP
                                  - CAD
                                  - CHF
                                  - SEK
                                  - DKK
                                  - NOK
                                  - PLN
                                  - HUF
                                type: string
                                x-enum-descriptions:
                                  USD: US Dollar.
                                  EUR: Euro.
                                  GBP: British Pound.
                                  CAD: Canadian Dollar.
                                  CHF: Swiss Franc.
                                  SEK: Swedish Krona.
                                  DKK: Danish Krone.
                                  NOK: Norwegian Krone.
                                  PLN: Polish Złoty.
                                  HUF: Hungarian Forint.
                            required:
                              - amount
                              - currency
                            description: Price per unit at time of purchase.
                            examples:
                              - amount: 14.99
                                currency: USD
                        required:
                          - productId
                          - name
                          - quantity
                          - unitPrice
                      description: Per-line-item breakdown.
                    counterparty:
                      type: object
                      properties:
                        username:
                          type: string
                          description: The other side of the order — buyer's username when you receive
                            this as a seller, seller's username when you receive
                            it as a buyer.
                        country:
                          type: string
                          minLength: 2
                          maxLength: 2
                          description: ISO 3166-1 alpha-2 country code of the counterparty's account.
                      required:
                        - username
                    createdAt:
                      type: string
                      format: date-time
                      description: When the order was placed.
                      examples:
                        - 2024-08-14T10:23:11.000Z
                  required:
                    - orderNumber
                    - status
                    - currency
                    - totalAmount
                    - itemCount
                    - items
                    - counterparty
                    - createdAt
                  description: Order details, shaped for the recipient role.
              required:
                - type
                - eventId
                - timestamp
                - recipientRole
                - data
              examples:
                - type: order.created
                  eventId: OR-ASNBC-1.seller
                  timestamp: 2026-05-09T14:23:11.000Z
                  recipientRole: seller
                  data:
                    orderNumber: OR-ASNBC-1
                    status: pending_shipment
                    currency: EUR
                    totalAmount:
                      amount: 42.5
                      currency: EUR
                    itemCount: 2
                    items:
                      - productId: 50212
                        name: Black Lotus
                        quantity: 1
                        unitPrice:
                          amount: 40
                          currency: EUR
                      - productId: 50213
                        name: Lightning Bolt
                        quantity: 1
                        unitPrice:
                          amount: 2.5
                          currency: EUR
                    counterparty:
                      username: buyer_jane
                      country: FR
                    createdAt: 2026-05-09T14:23:10.000Z
      responses:
        2XX:
          description: Acknowledged. Return any 2XX status to ack receipt; non-2XX
            triggers Svix's retry schedule.
  order.status.changed:
    post:
      summary: Order status changed
      description: Fires on every order status transition — shipped, delivered,
        completed, cancelled, disputed, or resolved. Delivered to both the
