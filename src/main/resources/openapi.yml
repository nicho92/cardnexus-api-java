  /feeds/{gameId}/changelog:
    get:
      operationId: feeds.getChangelog
      summary: Get the catalog changelog
      description: >-
        Returns the history of a game's catalog updates, newest first.


        Each entry covers one catalog update: when it went live and how many
        products and expansions were added, modified, or removed. Pass
        `includeChanges=true` to also get the slugs of everything that changed.


        Results are paginated. Pass the `nextCursor` from one response as
        `cursor` on the next request to walk the full history; `nextCursor` is
        `null` on the last page.


        For the feeds these updates apply to, see
        https://docs.cardnexus.com/feeds.


        Authentication is required (any valid API key); no scope.
      tags:
        - Feeds
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            description: The game's identifier (e.g. `mtg`, `pokemon`). Returned by `GET
              /v1/games`.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          allowEmptyValue: true
          allowReserved: true
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          allowEmptyValue: true
          allowReserved: true
        - name: includeChanges
          in: query
          required: false
          schema:
            type: boolean
            default: false
            description: When true, each entry includes the slugs of the products and
              expansions that changed, not just the counts.
          allowEmptyValue: true
          allowReserved: true
      responses:
        "200":
          description: Changelog page returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: This changelog entry's identifier.
                        deployedAt:
                          type: string
                          format: date-time
                          description: When this catalog update went live.
                          examples:
                            - 2024-08-14T10:23:11.000Z
                        summary:
                          type: object
                          properties:
                            products:
                              type: object
                              properties:
                                added:
                                  type: integer
                                  minimum: 0
                                  maximum: 9007199254740991
                                  description: Number added in this update.
                                modified:
                                  type: integer
                                  minimum: 0
                                  maximum: 9007199254740991
                                  description: Number modified in this update.
                                removed:
                                  type: integer
                                  minimum: 0
                                  maximum: 9007199254740991
                                  description: Number removed in this update.
                              required:
                                - added
                                - modified
                                - removed
                              description: How many products changed in this update.
                            expansions:
                              type: object
                              properties:
                                added:
                                  type: integer
                                  minimum: 0
                                  maximum: 9007199254740991
                                  description: Number added in this update.
                                modified:
                                  type: integer
                                  minimum: 0
                                  maximum: 9007199254740991
                                  description: Number modified in this update.
                                removed:
                                  type: integer
                                  minimum: 0
                                  maximum: 9007199254740991
                                  description: Number removed in this update.
                              required:
                                - added
                                - modified
                                - removed
                              description: How many expansions changed in this update.
                          required:
                            - products
                            - expansions
                        changes:
                          type: object
                          properties:
                            products:
                              type: object
                              properties:
                                added:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      slug:
                                        type: string
                                    required:
                                      - slug
                                  description: Slugs added in this update.
                                modified:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      slug:
                                        type: string
                                    required:
                                      - slug
                                  description: Slugs modified in this update.
                                removed:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      slug:
                                        type: string
                                    required:
                                      - slug
                                  description: Slugs removed in this update.
                              required:
                                - added
                                - modified
                                - removed
                            expansions:
                              type: object
                              properties:
                                added:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      slug:
                                        type: string
                                    required:
                                      - slug
                                  description: Slugs added in this update.
                                modified:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      slug:
                                        type: string
                                    required:
                                      - slug
                                  description: Slugs modified in this update.
                                removed:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      slug:
                                        type: string
                                    required:
                                      - slug
                                  description: Slugs removed in this update.
                              required:
                                - added
                                - modified
                                - removed
                          required:
                            - products
                            - expansions
                          description: The slugs that changed. Present only when you pass
                            `includeChanges=true`.
                      required:
                        - id
                        - deployedAt
                        - summary
                      examples:
                        - id: 665f1a2b3c4d5e6f7a8b9c0d
