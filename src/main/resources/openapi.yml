  /products/{productId}/prices:
    get:
      operationId: pricing.getProductPrices
      summary: Get a product's current prices
      description: >-
        Returns the product's current prices from three sources, keyed by
        finish:


        - `cardmarket` — Cardmarket's daily price snapshot, in EUR:
        `low`/`mid`/`high`/`marketValue` tiers plus 24h/7d/30d trend
        percentages. `date` is the snapshot's calendar date.

        - `tcgplayer` — TCGplayer's daily price snapshot, in USD, with the same
        fields.

        - `cardnexus` — the listings live on the CardNexus marketplace right
        now. `low` is the cheapest listing anywhere on the marketplace,
        converted to EUR at the current exchange rate; `listingCount` and
        `availableQuantity` count every region's listings. `regions` breaks the
        same numbers down per market region — `eu` in EUR and `na` in USD, each
        with its own cheapest listing, counts, and per-condition / per-language
        breakdowns. A region's prices are in that region's currency and never
        mixed with the other region's. A region with no live listings has no
        key. Graded listings count toward the totals but have no condition
        bucket.


        A source block is absent when it has no data — a finish with no live
        listings has no `cardnexus` block, and a product with no prices at all
        returns an empty `finishes` object.


        For day-by-day price history, see `GET
        /v1/products/{productId}/prices/history`. To download prices for a whole
        game in one file, see `GET /v1/feeds/{gameId}/prices`.


        Requests count against the `pricing-snapshot` rate limit: 600 requests
        per hour.


        Authentication is required (any valid API key); no scope.
      tags:
        - Pricing
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            anyOf:
              - type: number
              - type: string
                pattern: ^[0-9]+$
            description: The product to get prices for. Returned by `GET /v1/products` and
              `POST /v1/products/search`.
            examples:
              - 50212
      responses:
        "200":
          description: Current prices returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  productId:
                    type: integer
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                    description: The product these prices belong to.
                    examples:
                      - 50212
                  finishes:
                    type: object
                    propertyNames:
                      enum:
                        - Standard
                        - Foil
                        - Rainbow
                        - Gold
                        - Rainbow Foil
                        - Cold Foil
                        - Gold Foil
                        - Etched
                        - Signed
                        - Reverse Holo
                        - Blast Foil Rainbow
                        - Bubbles Foil
                        - Cracked Ice Foil
                        - Galaxy Foil
                        - Glitter Foil
                        - Multi Sideline Foil
                        - Rainbow Solid Texture Stamp
                        - Star Foil
                        - Surge Foil
                        - Full Art Gold Sign
                        - Depth Lenticular
                        - Flip Lenticular
                        - Lenticular
                        - Zarimoth
                        - Serialized
                        - Serialized Rose Gold
                        - Serialized Gold
                        - Holographic
                        - Embossed
                        - Holofoil
                      type: string
                      x-enum-descriptions:
                        Standard: A standard, non-foil card.
                        Foil: A foil card.
                        Reverse Holo: A card with a reverse-holofoil finish.
                        Etched: A card with an etched-foil finish.
                    additionalProperties:
                      type: object
                      properties:
                        cardmarket:
                          type: object
                          properties:
                            currency:
                              enum:
                                - EUR
                                - USD
                              type: string
                              description: "The currency every price in this block is in: `EUR` for
                                `cardmarket`, `USD` for `tcgplayer`."
                              x-enum-descriptions:
                                EUR: Euro.
                                USD: US Dollar.
                            low:
                              type: number
                              description: Lowest observed price, decimal major units.
                            mid:
                              type: number
                              description: Median observed price, decimal major units.
                            high:
                              type: number
                              description: Highest observed price, decimal major units.
                            marketValue:
                              type: number
                              description: Aggregate market price — the value shown as the canonical price on
                                cardnexus.com. Decimal major units.
                            change24h:
                              anyOf:
                                - type: number
                                - type: "null"
                              description: Percent change of `marketValue` vs. 24 hours ago. `null` when
                                there's not enough history.
                            change7d:
                              anyOf:
                                - type: number
                                - type: "null"
                              description: Percent change of `marketValue` vs. 7 days ago.
                            change30d:
                              anyOf:
                                - type: number
                                - type: "null"
                              description: Percent change of `marketValue` vs. 30 days ago.
                            date:
                              type: string
                              format: date
                              description: The calendar date these prices are for, `YYYY-MM-DD`. Prices are
                                daily snapshots.
                              examples:
                                - 2026-06-10
                            byCondition:
                              type: object
                              propertyNames:
                                enum:
                                  - NM
                                  - LP
                                  - MP
                                  - HP
